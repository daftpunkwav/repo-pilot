[project]
name = "repopilot-py-shared"
version = "0.1.0"
description = "API / Agent / MCP 共享的 Python 模型与工具"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.5.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["repopilot_shared"]
