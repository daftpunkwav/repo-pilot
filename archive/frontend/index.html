<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Stash</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div id="app">
  <!-- 登录 / 注册界面 -->
  <div class="auth-overlay" id="authOverlay">
    <div class="auth-container">
      <div class="auth-header">
        <i class="fa-brands fa-github"></i>
        <h1>GitHub Stash</h1>
      </div>
      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>
      <!-- 登录表单 -->
      <form class="auth-form active" id="loginForm">
        <div class="form-group">
          <label>账号</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="loginUsername" placeholder="输入账号" autocomplete="username">
          </div>
        </div>
        <div class="form-group">
          <label>密码</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="输入密码" autocomplete="current-password">
          </div>
        </div>
        <div class="auth-options">
          <label class="checkbox-label">
            <input type="checkbox" id="loginRememberPwd">
            <span>记住密码</span>
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="loginRememberMe">
            <span>保持登录</span>
          </label>
        </div>
        <div class="auth-error hidden" id="loginError"></div>
        <button type="submit" class="btn btn-primary btn-auth">登录</button>
      </form>
      <!-- 注册表单 -->
      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label>账号</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="regUsername" placeholder="2-32 个字符" autocomplete="username">
          </div>
        </div>
        <div class="form-group">
          <label>密码</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="regPassword" placeholder="至少 4 个字符" autocomplete="new-password">
          </div>
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="regPassword2" placeholder="再次输入密码" autocomplete="new-password">
          </div>
        </div>
        <div class="form-group">
          <label>GitHub 邮箱（可选）</label>
          <div class="input-icon-wrap">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="regGhEmail" placeholder="your@email.com">
          </div>
        </div>
        <div class="form-group">
          <label>GitHub ID（可选）</label>
          <div class="input-icon-wrap">
            <i class="fa-brands fa-github"></i>
            <input type="text" id="regGhId" placeholder="GitHub 用户名">
          </div>
        </div>
        <div class="auth-error hidden" id="registerError"></div>
        <button type="submit" class="btn btn-primary btn-auth">注册</button>
      </form>
    </div>
  </div>

  <!-- 侧边栏 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1 class="logo"><i class="fa-brands fa-github"></i> GitHub Stash</h1>
    </div>
    <div class="search-wrap">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input id="searchInput" type="text" placeholder="搜索...">
      <button class="clear-search" id="clearSearch"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <nav class="cat-nav" id="catNav"></nav>
    <div class="sidebar-footer">
      <button id="btnManageCats"><i class="fa-solid fa-layer-group"></i> 分类</button>
      <button id="btnGraph"><i class="fa-solid fa-diagram-project"></i> 图谱</button>
      <button id="btnSettings"><i class="fa-solid fa-gear"></i> 设置</button>
    </div>
  </aside>
  <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>

  <!-- 主区域 -->
  <main class="main">
    <div class="main-topbar">
      <div class="topbar-left">
        <span class="cat-title" id="categoryTitle">全部项目</span>
        <span class="count-badge" id="projectCount">0</span>
      </div>
      <div class="topbar-right">
        <div class="user-info" id="userInfo">
          <span class="user-name" id="userNameDisplay"></span>
          <button class="btn btn-ghost btn-sm" id="btnLogout" title="退出登录"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
        <div class="view-toggle" id="viewToggle">
          <button class="view-option active" data-view="list" title="列表视图"><i class="fa-solid fa-list"></i></button>
          <button class="view-option" data-view="card" title="卡片视图"><i class="fa-solid fa-grid-2"></i></button>
        </div>
        <div class="filter-wrap" id="filterWrap">
          <button id="btnFilter" class="btn btn-outline btn-sm btn-filter">
            <i class="fa-solid fa-filter"></i> 筛选
            <span class="filter-badge hidden" id="filterBadge">0</span>
          </button>
          <div class="filter-panel hidden" id="filterPanel">
            <div class="filter-section">
              <div class="filter-label">语言</div>
              <div class="filter-checkboxes" id="filterLanguages"></div>
            </div>
            <div class="filter-section">
              <div class="filter-label">Star 范围</div>
              <div class="filter-range">
                <input id="filterStarMin" type="number" placeholder="最小" min="0">
                <span class="range-sep">—</span>
                <input id="filterStarMax" type="number" placeholder="最大" min="0">
              </div>
            </div>
            <div class="filter-section">
              <div class="filter-label">排序方式</div>
              <select id="filterSort">
                <option value="">默认</option>
                <option value="stars_desc">Star 降序</option>
                <option value="stars_asc">Star 升序</option>
                <option value="name_asc">名称 A-Z</option>
                <option value="name_desc">名称 Z-A</option>
              </select>
            </div>
            <div class="filter-section">
              <div class="filter-label">学习进度</div>
              <div class="filter-checkboxes" id="filterProgress"></div>
            </div>
            <div class="filter-actions">
              <button class="btn btn-outline btn-sm" id="btnFilterReset">重置</button>
              <button class="btn btn-primary btn-sm" id="btnFilterApply">确定</button>
            </div>
          </div>
        </div>
        <button id="btnGitHub" class="btn btn-outline btn-sm">
          <i class="fa-brands fa-github"></i> 同步 Star
        </button>
        <button id="btnAdd" class="btn btn-primary btn-sm">
          <i class="fa-solid fa-plus"></i> 添加
        </button>
      </div>
    </div>
    <div class="main-zoom">
    <div class="project-list" id="projectListArea">
      <div class="project-list-inner" id="projectList"></div>
      <div class="empty-state hidden" id="emptyState">
        <i class="fa-regular fa-folder-open"></i>
        <p>空空如也</p>
        <p class="sub">添加项目或同步 GitHub Star 开始收藏</p>
      </div>
    </div>
    </div>
  </main>
</div>

<!-- ── 卡片详情弹窗 ── -->
<div class="modal-overlay hidden" id="modalCardDetail">
  <div class="modal">
    <div class="modal-header">
      <span id="cardDetailTitle">项目详情</span>
      <button class="modal-close" data-close="modalCardDetail"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body" id="cardDetailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" id="btnCardEdit"><i class="fa-solid fa-pen"></i> 编辑</button>
      <button class="btn btn-outline btn-sm btn-danger-ghost" id="btnCardDelete"><i class="fa-solid fa-trash"></i> 删除</button>
      <button class="btn btn-outline btn-sm" data-close="modalCardDetail">关闭</button>
    </div>
  </div>
</div>

<!-- ── 添加 / 编辑弹窗 ── -->
<div class="modal-overlay hidden" id="modalProject">
  <div class="modal">
    <div class="modal-header">
      <span id="modalTitle">添加项目</span>
      <button class="modal-close" data-close="modalProject"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>项目名称</label>
        <input id="fName" type="text" placeholder="owner/repo 或名称">
      </div>
      <div class="form-group">
        <label>URL</label>
        <input id="fUrl" type="text" placeholder="https://github.com/...">
      </div>
      <div class="form-row">
        <div class="form-group flex-2">
          <label>分类</label>
          <select id="fCategory"></select>
        </div>
        <div class="form-group flex-1">
          <label>语言</label>
          <input id="fLanguage" type="text" placeholder="Python">
        </div>
      </div>
      <div class="form-group">
        <label>标签（逗号分隔）</label>
        <input id="fTags" type="text" placeholder="ai, llm">
      </div>
      <div class="form-group">
        <label>描述</label>
        <textarea id="fDesc" rows="2" placeholder="简介..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group flex-1"><label>Star</label><input id="fStars" type="number" value="0" min="0"></div>
        <div class="form-group flex-1"><label>备注</label><input id="fNote" type="text" placeholder="个人备注"></div>
      </div>
    </div>
    <div class="modal-footer">
      <span class="modal-error hidden" id="modalError"></span>
      <button class="btn btn-outline" data-close="modalProject">取消</button>
      <button class="btn btn-primary" id="btnSave">保存</button>
    </div>
  </div>
</div>

<!-- ── 设置弹窗 ── -->
<div class="modal-overlay hidden" id="modalSettings">
  <div class="modal modal-wide">
    <div class="modal-header">
      <span>设置</span>
      <button class="modal-close" data-close="modalSettings"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="settings-section">
        <h3>外观</h3>
        <div class="theme-selector">
          <div class="theme-category-label">浅色</div>
          <div class="theme-swatches" id="themeSwatchesLight"></div>
          <div class="theme-category-label">深色</div>
          <div class="theme-swatches" id="themeSwatchesDark"></div>
          <div class="theme-category-label">高对比度</div>
          <div class="theme-swatches" id="themeSwatchesHC"></div>
        </div>
        <div class="settings-row">
          <span>界面缩放</span>
          <div class="slider-group">
            <input id="rZoom" type="range" min="0.7" max="1.5" step="0.05" value="1.0">
            <span class="slider-value" id="vZoom">100%</span>
          </div>
        </div>
        <div class="settings-row">
          <span>字体大小</span>
          <div class="slider-group">
            <input id="rFont" type="range" min="0.8" max="1.5" step="0.05" value="1.0">
            <span class="slider-value" id="vFont">100%</span>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <h3>GitHub 账号</h3>
        <div class="gh-accounts-list" id="ghAccountsList">
          <span class="text-muted" style="font-size:0.82rem">暂无绑定账号</span>
        </div>
        <div class="add-gh-row">
          <input id="ghBindEmail" type="email" placeholder="GitHub 邮箱">
          <input id="ghBindId" type="text" placeholder="GitHub ID">
          <button class="btn btn-primary btn-sm" id="btnBindGh"><i class="fa-solid fa-link"></i> 绑定</button>
        </div>
      </div>
      <div class="settings-section">
        <h3>数据</h3>
        <div class="settings-row">
          <span>导出数据</span>
          <button class="btn btn-outline btn-sm" id="btnExport"><i class="fa-solid fa-download"></i> JSON</button>
        </div>
        <div class="settings-row">
          <span>导入数据</span>
          <button class="btn btn-outline btn-sm" id="btnImportTrigger"><i class="fa-solid fa-upload"></i> JSON</button>
          <input class="hidden" id="importFile" type="file" accept=".json">
        </div>
        <div class="settings-row">
          <span>清空全部</span>
          <button class="btn btn-outline btn-sm" id="btnClearAll" style="color:var(--danger);border-color:var(--danger)">清空</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── 分类管理弹窗 ── -->
<div class="modal-overlay hidden" id="modalCategories">
  <div class="modal">
    <div class="modal-header">
      <span>管理分类</span>
      <button class="modal-close" data-close="modalCategories"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="add-cat-row">
        <input id="newCatName" type="text" placeholder="新分类名称">
        <button class="btn btn-primary btn-sm" id="btnAddCat">添加</button>
      </div>
      <div class="cat-manage-list" id="catList"></div>
    </div>
  </div>
</div>

<!-- ── GitHub 同步弹窗 ── -->
<div class="modal-overlay hidden" id="modalGitHub">
  <div class="modal modal-wide">
    <div class="modal-header">
      <span>同步 GitHub Star</span>
      <button class="modal-close" data-close="modalGitHub"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="gh-fetch-row">
        <input id="ghUsername" type="text" placeholder="GitHub 用户名（或使用已绑定账号）">
        <button class="btn btn-primary btn-sm" id="btnFetch">获取</button>
      </div>
      <div class="gh-bound-accounts hidden" id="ghBoundAccounts">
        <span class="gh-bound-label">已绑定账号：</span>
        <div class="gh-bound-list" id="ghBoundList"></div>
      </div>
      <div class="gh-status hidden" id="ghStatus"></div>
      <div class="gh-toolbar hidden" id="ghToolbar">
        <label class="checkbox-label"><input id="ghSelectAll" type="checkbox"><span>全选</span></label>
        <button class="btn btn-primary btn-sm" id="btnImportSelected">导入选中</button>
      </div>
      <div class="gh-repo-list" id="ghRepoList"></div>
    </div>
  </div>
</div>

<!-- ── 图谱全屏遮罩（必须在 modal-overlay 外部，避免 backdrop-filter 破坏 fixed 定位） ── -->
<div class="graph-overlay hidden" id="graphOverlay">
  <div class="graph-topbar">
    <div class="graph-topbar-left">
      <span class="graph-title"><i class="fa-solid fa-diagram-project"></i> 项目关系图谱</span>
      <span class="graph-stats" id="graphStats"></span>
    </div>
    <div class="graph-topbar-center">
      <div class="graph-search">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="graphSearchInput" placeholder="搜索节点..." autocomplete="off">
        <div class="graph-search-dropdown" id="graphSearchDropdown"></div>
      </div>
    </div>
    <div class="graph-topbar-right">
      <button class="graph-btn" id="graphBtnFit" title="适应画布"><i class="fa-solid fa-expand"></i></button>
      <button class="graph-btn active" id="graphBtnLabels" title="切换标签"><i class="fa-solid fa-font"></i></button>
      <button class="graph-btn graph-btn-close" id="graphBtnClose" title="关闭"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </div>
  <div class="graph-body" id="graphBody">
    <div class="graph-loading" id="graphLoading">
      <div class="graph-spinner"></div>
      <p>正在加载 D3.js...</p>
    </div>
    <div class="graph-tooltip" id="graphTooltip"></div>
    <div class="graph-zoom-indicator" id="graphZoomIndicator"></div>
  </div>
  <div class="graph-legend" id="graphLegend"></div>
</div>

<script src="app.js"></script>
<script src="settings.js"></script>
<script src="github_sync.js"></script>
<script src="login.js"></script>
</body>
</html>
