<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>项目关系图谱 · RepoPilot</title>
  <link rel="stylesheet" href="./assets/design-system.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       GraphPage 私有样式（保留原视觉）
       ============================================================ */
    .graph-content { padding: 16px; max-width: none; }
    .graph-stage { position: relative; height: calc(100vh - var(--topbar-h) - 32px); min-height: 640px; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--bg-300); background: radial-gradient(circle at 50% 45%, var(--bg-50) 0%, var(--bg-100) 70%, var(--bg-200) 100%); box-shadow: var(--shadow-sm); }

    .graph-toolbar { position: absolute; top: 16px; left: 16px; right: 16px; z-index: 5; display: grid; grid-template-columns: minmax(220px, 1.2fr) auto minmax(220px, 1fr); gap: 16px; align-items: center; padding: 12px 16px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--bg-300); border-radius: var(--radius); box-shadow: var(--shadow-md); }
    .graph-title h1 { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 2px; }
    .graph-title p { font-size: 12px; color: var(--text-500); margin: 0; }

    .graph-controls { display: flex; gap: 8px; align-items: center; }
    .graph-search { display: flex; align-items: center; gap: 8px; height: 32px; width: 200px; padding: 0 10px; background: var(--bg-50); border: 1px solid var(--bg-300); border-radius: var(--radius-sm); color: var(--text-500); font-size: 12px; transition: border-color 0.15s var(--ease); }
    .graph-search:focus-within { border-color: var(--brand-500); box-shadow: 0 0 0 3px var(--brand-50); }
    .graph-search svg { width: 14px; height: 14px; flex-shrink: 0; }
    .graph-search input { flex: 1; min-width: 0; border: 0; outline: 0; background: transparent; font: inherit; color: var(--text-800); }
    .graph-search input::placeholder { color: var(--text-400); }

    .zoom-group { display: inline-flex; align-items: center; height: 32px; background: var(--bg-50); border: 1px solid var(--bg-300); border-radius: var(--radius-sm); overflow: hidden; }
    .zoom-btn { width: 28px; height: 30px; display: grid; place-items: center; border: 0; background: transparent; color: var(--text-600); font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.12s var(--ease); }
    .zoom-btn:hover { background: var(--bg-200); color: var(--text-800); }
    .zoom-label { width: 56px; height: 30px; display: grid; place-items: center; font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--text-700); border-left: 1px solid var(--bg-300); border-right: 1px solid var(--bg-300); }

    .layout-switch { display: inline-flex; align-items: center; height: 32px; background: var(--bg-50); border: 1px solid var(--bg-300); border-radius: 999px; padding: 3px; gap: 0; }
    .layout-switch button { height: 24px; padding: 0 12px; border: 0; background: transparent; border-radius: 999px; font-size: 12px; font-weight: 600; color: var(--text-500); cursor: pointer; transition: all 0.15s var(--ease); }
    .layout-switch button.active { background: var(--brand-500); color: #fff; box-shadow: var(--shadow-sm); }

    .graph-legend { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; font-size: 11px; }
    .legend-item { display: inline-flex; align-items: center; gap: 5px; color: var(--text-700); font-weight: 500; }
    .legend-dot { width: 8px; height: 8px; border-radius: 999px; }
    .legend-badge { display: inline-flex; align-items: center; gap: 4px; height: 26px; padding: 0 10px; background: var(--bg-50); border: 1px solid var(--bg-300); border-radius: 999px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--text-700); }
    .legend-badge strong { color: var(--brand-500); }

    .graph-svg { width: 100%; height: 100%; display: block; }
    .edge { fill: none; stroke-linecap: round; transition: opacity 0.2s var(--ease), stroke-width 0.2s var(--ease); }
    .edge.high { stroke: var(--brand-500); opacity: 0.85; }
    .edge.mid  { stroke: var(--brand-300); opacity: 0.65; }
    .edge.low  { stroke: var(--bg-400);   opacity: 0.55; }
    .edge.dashed { stroke-dasharray: 4 4; opacity: 0.5; }

    .node { cursor: pointer; transform-origin: center; transform-box: fill-box; transition: transform 0.18s var(--ease), filter 0.18s var(--ease); }
    .node-circle { stroke: #fff; stroke-width: 2; filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.15)); }
    .node-label { font-family: var(--font-mono); font-size: 10px; fill: var(--text-700); text-anchor: middle; pointer-events: none; font-weight: 500; }
    .node.center .node-label { font-size: 11px; font-weight: 700; fill: var(--text-800); }

    .cat-frontend .node-circle, .node-circle.cat-frontend { fill: #007aff; }
    .cat-backend  .node-circle, .node-circle.cat-backend  { fill: #30d158; }
    .cat-ai       .node-circle, .node-circle.cat-ai       { fill: #ff3b30; }
    .cat-data     .node-circle, .node-circle.cat-data     { fill: #ff9f0a; }
    .cat-devops   .node-circle, .node-circle.cat-devops   { fill: #5e5ce6; }
    .cat-tools    .node-circle, .node-circle.cat-tools    { fill: #8e8e93; }

    .node.selected .node-circle { stroke: var(--brand-500); stroke-width: 4; filter: drop-shadow(0 0 0 4px rgba(0, 122, 255, 0.18)) drop-shadow(0 2px 6px rgba(0, 122, 255, 0.4)); }
    .node.selected { transform: scale(1.12); }
    .node.is-hover .node-circle { stroke: var(--brand-700); stroke-width: 3; filter: drop-shadow(0 4px 10px rgba(0, 122, 255, 0.35)); }
    .node.is-hover { transform: scale(1.25); }
    .node.dim { opacity: 0.25; }

    .node-tooltip { position: absolute; pointer-events: none; background: var(--bg-900); color: #fff; padding: 8px 12px; border-radius: 10px; font-size: 11px; line-height: 1.5; box-shadow: var(--shadow-lg); z-index: 7; transform: translate(-50%, -100%); white-space: nowrap; }
    .node-tooltip::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%) rotate(45deg); width: 8px; height: 8px; background: var(--bg-900); }
    .node-tooltip strong { font-family: var(--font-mono); font-size: 12px; display: block; margin-bottom: 4px; color: #fff; }
    .node-tooltip .tt-score { color: var(--brand-300); font-weight: 700; font-family: var(--font-mono); }
    .node-tooltip .tt-cat { display: inline-block; margin-top: 4px; padding: 2px 6px; border-radius: 4px; background: rgba(255, 255, 255, 0.12); font-size: 10px; color: rgba(255, 255, 255, 0.85); }

    .node-detail { position: absolute; top: 84px; right: 24px; width: 320px; background: var(--bg-50); border: 1px solid var(--bg-300); border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 18px; z-index: 6; }
    .node-detail::before { content: ''; position: absolute; top: 18px; left: -6px; width: 12px; height: 12px; background: var(--bg-50); border-left: 1px solid var(--bg-300); border-bottom: 1px solid var(--bg-300); transform: rotate(45deg); }
    .node-detail-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
    .node-avatar { width: 40px; height: 40px; border-radius: 10px; background: linear-gradient(135deg, #007aff, #5e5ce6); color: #fff; display: grid; place-items: center; font-weight: 700; font-family: var(--font-mono); flex-shrink: 0; }
    .node-meta-name { font-family: var(--font-mono); font-weight: 600; font-size: 14px; color: var(--text-800); }
    .node-meta-cat { font-size: 11px; color: var(--text-500); margin-top: 2px; }
    .node-detail-close { margin-left: auto; width: 24px; height: 24px; border-radius: 999px; background: var(--bg-200); border: 0; color: var(--text-500); display: grid; place-items: center; flex-shrink: 0; cursor: pointer; transition: background 0.12s var(--ease); }
    .node-detail-close:hover { background: var(--bg-300); color: var(--text-800); }

    .node-detail-section { margin-bottom: 14px; }
    .detail-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-500); margin-bottom: 8px; }
    .detail-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; font-size: 12px; color: var(--text-700); }
    .detail-row .muted { color: var(--text-500); }
    .detail-row strong { color: var(--text-800); font-weight: 600; }

    .similar-list { display: flex; flex-direction: column; gap: 6px; }
    .similar-item { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: var(--radius-sm); background: var(--bg-100); font-size: 12px; cursor: pointer; }
    .similar-item:hover { background: var(--bg-200); }
    .similar-avatar { width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center; color: #fff; font-size: 10px; font-weight: 700; font-family: var(--font-mono); flex-shrink: 0; }
    .similar-name { font-family: var(--font-mono); font-size: 12px; color: var(--text-800); }
    .similar-score { margin-left: auto; font-family: var(--font-mono); font-weight: 700; color: var(--brand-500); font-size: 11px; }
    .similar-bar { margin-top: 4px; height: 3px; background: var(--bg-300); border-radius: 999px; overflow: hidden; }
    .similar-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--brand-400), var(--brand-500)); border-radius: inherit; }

    .detail-actions { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--bg-300); }

    .minimap { position: absolute; bottom: 80px; right: 24px; width: 160px; height: 120px; background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--bg-300); border-radius: var(--radius-sm); box-shadow: var(--shadow-md); padding: 8px 10px; z-index: 5; }
    .minimap-head { display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--text-500); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
    .minimap svg { width: 100%; height: 88px; display: block; }
    .minimap-frame { fill: rgba(0, 122, 255, 0.08); stroke: var(--brand-500); stroke-width: 1.2; }

    .graph-statusbar { position: absolute; bottom: 16px; left: 16px; right: 200px; display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid var(--bg-300); border-radius: var(--radius); padding: 10px 16px; font-size: 11px; color: var(--text-600); box-shadow: var(--shadow-sm); z-index: 5; }
    .stat-row { display: inline-flex; align-items: center; gap: 6px; }
    .stat-row + .stat-row { margin-left: 16px; padding-left: 16px; border-left: 1px solid var(--bg-300); }
    .stat-dot { width: 6px; height: 6px; border-radius: 999px; background: var(--success); box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.18); }
    .stat-mono { font-family: var(--font-mono); font-weight: 600; color: var(--text-700); }
    .health-bar { display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px; background: var(--success-surface); border-radius: 999px; font-weight: 600; color: #1e7e34; font-size: 11px; }
    .export-actions { display: inline-flex; gap: 6px; align-items: center; }
    .export-btn { display: inline-flex; align-items: center; gap: 4px; height: 28px; padding: 0 10px; background: var(--bg-50); border: 1px solid var(--bg-300); border-radius: var(--radius-sm); color: var(--text-700); font: 600 11px/1 var(--font-sans); cursor: pointer; transition: background 0.12s var(--ease); }
    .export-btn:hover { background: var(--bg-200); color: var(--text-800); }
    .export-btn.primary { background: var(--brand-500); color: #fff; border-color: var(--brand-500); }
    .export-btn.primary:hover { background: var(--brand-600); }

    .graph-hint { position: absolute; top: 84px; left: 24px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid var(--bg-300); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 11px; color: var(--text-600); box-shadow: var(--shadow-xs); z-index: 5; display: flex; flex-direction: column; gap: 4px; }
    .graph-hint kbd { display: inline-block; padding: 1px 5px; background: var(--bg-200); border: 1px solid var(--bg-300); border-radius: 4px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; color: var(--text-700); margin: 0 2px; }
  </style>
</head>
<body data-page="graph">
  <div class="app">
    <div id="app-sidebar"></div>

    <div class="main">
      <header id="app-topbar"></header>

      <div class="graph-content">
        <div class="graph-stage">
          <div class="graph-toolbar">
            <div class="graph-title">
              <h1>项目关系图谱</h1>
              <p id="graph-subtitle">基于 TF-IDF 相似度的项目网络 · 自动收敛中</p>
            </div>
            <div class="graph-controls">
              <label class="graph-search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
                <input id="graph-search-input" placeholder="搜索项目名（owner/repo）" />
              </label>
              <div class="zoom-group" role="group" aria-label="缩放控件">
                <button class="zoom-btn" id="zoom-out" title="缩小">−</button>
                <span class="zoom-label" id="zoom-label">100%</span>
                <button class="zoom-btn" id="zoom-in" title="放大">+</button>
              </div>
              <div class="layout-switch" role="group" aria-label="布局切换">
                <button class="active">力导向</button>
                <button>树状</button>
                <button>径向</button>
              </div>
            </div>
            <div class="graph-legend">
              <span class="legend-item"><span class="legend-dot" style="background:#007aff"></span>Web 前端</span>
              <span class="legend-item"><span class="legend-dot" style="background:#30d158"></span>Web 后端</span>
              <span class="legend-item"><span class="legend-dot" style="background:#ff3b30"></span>AI / ML</span>
              <span class="legend-item"><span class="legend-dot" style="background:#ff9f0a"></span>数据科学</span>
              <span class="legend-item"><span class="legend-dot" style="background:#5e5ce6"></span>DevOps</span>
              <span class="legend-item"><span class="legend-dot" style="background:#6e6e73"></span>工具 / 库</span>
              <span class="legend-badge"><strong id="legend-nodes">0</strong>&nbsp;节点&nbsp;/&nbsp;<strong id="legend-edges">0</strong>&nbsp;连线</span>
            </div>
          </div>

          <div class="graph-hint">
            <div><kbd>滚轮</kbd> 缩放 · <kbd>拖拽</kbd> 移动</div>
            <div><kbd>点击</kbd> 节点查看详情 · <kbd>双击</kbd> 跳转</div>
          </div>

          <!-- SVG Graph（节点由 JS 动态填充） -->
          <svg class="graph-svg" id="graph-svg" viewBox="0 0 1400 760" preserveAspectRatio="xMidYMid meet">
            <defs>
              <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#007aff" stop-opacity="0.35"/>
                <stop offset="100%" stop-color="#007aff" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <circle cx="700" cy="380" r="120" fill="url(#centerGlow)"/>
            <g id="edges"></g>
            <g id="nodes"></g>
          </svg>

          <div class="node-tooltip" id="tooltip" style="display:none;">
            <strong id="tt-name">--</strong>
            <span class="tt-score" id="tt-score">0.00</span> 相似度 · <span id="tt-desc">--</span>
            <span class="tt-cat" id="tt-cat">--</span>
          </div>

          <!-- 右侧详情面板（默认隐藏，由 JS 选中节点后填充） -->
          <div class="node-detail" id="detail-panel" style="display:none;">
            <div class="node-detail-head">
              <div class="node-avatar" id="d-avatar">R</div>
              <div style="flex:1; min-width:0">
                <div class="node-meta-name" id="d-name">--</div>
                <div class="node-meta-cat" id="d-cat">--</div>
              </div>
              <button class="node-detail-close" id="d-close" title="关闭">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" width="12" height="12"><path d="M6 6l12 12M18 6L6 18"/></svg>
              </button>
            </div>
            <div class="node-detail-section">
              <div class="detail-label">基本信息</div>
              <div class="detail-row"><span class="muted">分类</span><strong id="d-cat2">--</strong></div>
              <div class="detail-row"><span class="muted">主语言</span><strong id="d-lang">--</strong></div>
              <div class="detail-row"><span class="muted">Stars</span><strong id="d-stars">--</strong></div>
              <div class="detail-row"><span class="muted">最近提交</span><strong id="d-updated">--</strong></div>
            </div>
            <div class="node-detail-section">
              <div class="detail-label">相似度最高的 3 个</div>
              <div class="similar-list" id="d-similar"></div>
            </div>
            <div class="detail-actions">
              <a class="btn btn-primary btn-block" id="d-detail">查看详情</a>
              <button class="btn btn-secondary btn-block" id="d-scout">Scout 快速分析</button>
              <button class="btn btn-ghost btn-block" id="d-compare">与该项目对比 →</button>
            </div>
          </div>

          <div class="minimap">
            <div class="minimap-head">
              <span>缩略</span>
              <span class="stat-mono">1:8</span>
            </div>
            <svg viewBox="0 0 140 88" preserveAspectRatio="xMidYMid meet" id="minimap-svg">
              <rect class="minimap-frame" x="32" y="20" width="64" height="48"/>
            </svg>
          </div>

          <div class="graph-statusbar">
            <div>
              <span class="stat-row"><span class="stat-dot"></span><span class="stat-mono">60 FPS</span></span>
              <span class="stat-row"><span class="stat-mono" id="status-nodes">0 节点</span><span class="muted">/</span><span class="stat-mono" id="status-edges">0 连线</span></span>
              <span class="stat-row"><span class="muted">缩放</span><span class="stat-mono" id="status-zoom">100%</span></span>
              <span class="stat-row"><span class="muted">阈值</span><span class="stat-mono">≥ 0.10</span></span>
            </div>
            <div>
              <span class="health-bar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11"><path d="M5 12l4 4L19 6"/></svg>
                图谱健康 · 力导向已收敛
              </span>
            </div>
            <div class="export-actions">
              <span class="stat-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/></svg>
                导出
              </span>
              <button class="export-btn primary" id="btn-export-png">PNG</button>
              <button class="export-btn" id="btn-export-svg">SVG</button>
              <button class="export-btn" id="btn-export-json">JSON</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./assets/api-mock.js"></script>
  <script src="./assets/sidebar.js"></script>
  <script src="./assets/topbar.js"></script>
  <script src="./assets/app-shell.js"></script>
  <script>
    (async function () {
      const api = await RP.ensureApiClient();
      const graph = (await api.getGraph()).data;
      const projects = (await api.listProjects({ page_size: 100 })).data.items;

      // 简单径向布局：中心是 React（mock 数据），其余围绕
      const center = projects.find(p => p.id === 'p_react') || projects[0];
      const others = projects.filter(p => p.id !== center.id);

      // 节点位置（环形布局）
      const cx = 700, cy = 380;
      const radius = 280;
      const positions = {};
      positions[center.id] = { x: cx, y: cy };
      others.forEach((p, i) => {
        const angle = (i / others.length) * Math.PI * 2;
        const r = radius + (i % 3 - 1) * 60;
        positions[p.id] = { x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r };
      });

      // 渲染节点
      const catMap = {
        cat_frontend: 'cat-frontend', cat_backend: 'cat-backend',
        cat_ai: 'cat-ai', cat_data: 'cat-data',
        cat_devops: 'cat-devops', cat_tools: 'cat-tools'
      };
      const nodeEls = [];
      const nodesG = document.getElementById('nodes');
      others.forEach((p, i) => {
        const pos = positions[p.id];
        const cat = catMap[p.category_id] || 'cat-tools';
        const r = 12 + (p.stars > 100000 ? 8 : 0);
        const [owner, repo] = p.name.split('/');
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'node');
        g.setAttribute('transform', `translate(${pos.x} ${pos.y})`);
        g.setAttribute('data-id', p.id);
        g.setAttribute('data-name', p.name);
        g.setAttribute('data-cat', p.category_id || '');
        g.setAttribute('data-lang', p.language || '');
        g.setAttribute('data-stars', p.stars);
        g.setAttribute('data-desc', p.description || '');
        g.innerHTML = `
          <circle class="node-circle ${cat}" r="${r}"></circle>
          <text class="node-label" y="${r + 14}">${p.name}</text>
        `;
        g.addEventListener('click', () => selectNode(p.id));
        g.addEventListener('dblclick', () => { window.location.href = `project-detail.html?id=${p.id}`; });
        g.addEventListener('mouseenter', () => hoverNode(p.id));
        g.addEventListener('mouseleave', hideTooltip);
        nodesG.appendChild(g);
        nodeEls.push(g);
      });

      // 中心节点
      const centerG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      centerG.setAttribute('class', 'node center selected');
      centerG.setAttribute('transform', `translate(${cx} ${cy})`);
      centerG.setAttribute('data-id', center.id);
      const [, centerRepo] = center.name.split('/');
      centerG.innerHTML = `
        <circle class="node-circle cat-frontend" r="32"></circle>
        <text class="node-label" y="6">${centerRepo[0].toUpperCase()}</text>
        <text class="node-label" y="50">${center.name}</text>
      `;
      centerG.addEventListener('click', () => selectNode(center.id));
      centerG.addEventListener('dblclick', () => { window.location.href = `project-detail.html?id=${center.id}`; });
      centerG.addEventListener('mouseenter', () => hoverNode(center.id));
      centerG.addEventListener('mouseleave', hideTooltip);
      nodesG.appendChild(centerG);
      nodeEls.push(centerG);

      // 渲染边
      const edgesG = document.getElementById('edges');
      (graph.edges || []).forEach(e => {
        const s = positions[e.source];
        const t = positions[e.target];
        if (!s || !t) return;
        const cls = e.similarity >= 0.85 ? 'edge high' : e.similarity >= 0.6 ? 'edge mid' : 'edge low';
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const mx = (s.x + t.x) / 2 + (t.y - s.y) * 0.1;
        const my = (s.y + t.y) / 2 + (s.x - t.x) * 0.1;
        path.setAttribute('class', cls);
        path.setAttribute('d', `M${s.x} ${s.y} Q${mx} ${my} ${t.x} ${t.y}`);
        edgesG.appendChild(path);
      });

      // 统计
      const nodeCount = projects.length;
      const edgeCount = (graph.edges || []).length;
      document.getElementById('legend-nodes').textContent = nodeCount;
      document.getElementById('legend-edges').textContent = edgeCount;
      document.getElementById('status-nodes').textContent = nodeCount + ' 节点';
      document.getElementById('status-edges').textContent = edgeCount + ' 连线';
      document.getElementById('graph-subtitle').textContent = `基于 TF-IDF 相似度的项目网络 · ${nodeCount} 节点 / ${edgeCount} 连线`;

      // ============ 交互 ============
      let selectedId = center.id;
      let zoom = 1;

      function selectNode(id) {
        selectedId = id;
        nodeEls.forEach(el => {
          const isSel = el.getAttribute('data-id') === id;
          el.classList.toggle('selected', isSel);
        });
        showDetail(id);
      }

      function showDetail(id) {
        const p = projects.find(x => x.id === id);
        if (!p) return;
        const [owner, repo] = p.name.split('/');
        document.getElementById('detail-panel').style.display = 'block';
        document.getElementById('d-avatar').textContent = repo[0].toUpperCase();
        document.getElementById('d-name').textContent = p.name;
        document.getElementById('d-cat').textContent = RP.categoryLabel(p.category_id) + ' · MIT License';
        document.getElementById('d-cat2').textContent = RP.categoryLabel(p.category_id);
        document.getElementById('d-lang').textContent = p.language || '-';
        document.getElementById('d-stars').textContent = RP.formatNumber(p.stars);
        document.getElementById('d-updated').textContent = RP.formatDate(p.imported_at);
        document.getElementById('d-detail').href = `project-detail.html?id=${id}`;

        // 相似项目
        const similar = (graph.edges || [])
          .filter(e => e.source === id || e.target === id)
          .map(e => ({ id: e.source === id ? e.target : e.source, sim: e.similarity }))
          .sort((a, b) => b.sim - a.sim)
          .slice(0, 3);
        const gradients = ['#007aff', '#5e5ce6', '#30d158'];
        document.getElementById('d-similar').innerHTML = similar.length === 0
          ? '<div style="padding:8px;color:var(--text-400);font-size:12px;text-align:center;">暂无关联</div>'
          : similar.map((s, i) => {
            const sp = projects.find(x => x.id === s.id);
            if (!sp) return '';
            return `
              <div class="similar-item" onclick="window.location.href='project-detail.html?id=${sp.id}'">
                <div class="similar-avatar" style="background:${gradients[i]}">${sp.name.split('/')[1][0].toUpperCase()}</div>
                <div style="flex:1; min-width:0">
                  <div class="similar-name">${sp.name}</div>
                  <div class="similar-bar"><span style="width:${s.sim * 100}%"></span></div>
                </div>
                <div class="similar-score">${s.sim.toFixed(2)}</div>
              </div>
            `;
          }).join('');

        // 操作按钮
        document.getElementById('d-scout').onclick = () => {
          RP.toast('Scout 正在分析...', 'info');
          setTimeout(() => { window.location.href = `agent.html?analyze=${id}&agent=scout`; }, 600);
        };
        document.getElementById('d-compare').onclick = () => {
          RP.toast('对比功能（演示）', 'info');
        };
      }

      document.getElementById('d-close').addEventListener('click', () => {
        document.getElementById('detail-panel').style.display = 'none';
        selectedId = null;
        nodeEls.forEach(el => el.classList.remove('selected'));
      });

      // Tooltip
      const tooltip = document.getElementById('tooltip');
      function hoverNode(id) {
        const p = projects.find(x => x.id === id);
        if (!p) return;
        document.getElementById('tt-name').textContent = p.name;
        document.getElementById('tt-score').textContent = '0.85';
        document.getElementById('tt-desc').textContent = p.description || '';
        document.getElementById('tt-cat').textContent = RP.categoryLabel(p.category_id);
        // 找相似度
        const edge = (graph.edges || []).find(e => e.source === id || e.target === id);
        if (edge) document.getElementById('tt-score').textContent = edge.similarity.toFixed(2);
        tooltip.style.display = 'block';
        // 定位（节点 SVG 坐标转屏幕坐标）
        const g = nodeEls.find(el => el.getAttribute('data-id') === id);
        if (!g) return;
        const bbox = g.getBoundingClientRect();
        const stage = document.querySelector('.graph-stage').getBoundingClientRect();
        tooltip.style.left = (bbox.left + bbox.width / 2 - stage.left) + 'px';
        tooltip.style.top = (bbox.top - stage.top - 8) + 'px';
      }
      function hideTooltip() {
        tooltip.style.display = 'none';
      }

      // 缩放
      function setZoom(z) {
        zoom = Math.max(0.5, Math.min(2, z));
        const svg = document.getElementById('graph-svg');
        const inner = svg.querySelector('#edges').parentNode;
        // 简化：缩放 viewBox
        const baseW = 1400, baseH = 760;
        svg.setAttribute('viewBox', `${(baseW - baseW * zoom) / 2} ${(baseH - baseH * zoom) / 2} ${baseW * zoom} ${baseH * zoom}`);
        document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';
        document.getElementById('status-zoom').textContent = Math.round(zoom * 100) + '%';
      }
      document.getElementById('zoom-in').addEventListener('click', () => setZoom(zoom + 0.1));
      document.getElementById('zoom-out').addEventListener('click', () => setZoom(zoom - 0.1));

      // 搜索
      document.getElementById('graph-search-input').addEventListener('input', (e) => {
        const q = e.target.value.trim().toLowerCase();
        nodeEls.forEach(el => {
          const name = el.getAttribute('data-name').toLowerCase();
          el.classList.toggle('dim', q && !name.includes(q));
        });
      });

      // 布局切换（演示）
      document.querySelectorAll('.layout-switch button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.layout-switch button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          RP.toast(`布局：${btn.textContent}（演示）`, 'info');
        });
      });

      // 导出
      document.getElementById('btn-export-png').addEventListener('click', () => RP.toast('导出 PNG（演示）', 'info'));
      document.getElementById('btn-export-svg').addEventListener('click', () => RP.toast('导出 SVG（演示）', 'info'));
      document.getElementById('btn-export-json').addEventListener('click', () => {
        const blob = new Blob([JSON.stringify(graph, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'graph-export.json';
        a.click();
        URL.revokeObjectURL(url);
      });

      // 默认选中中心
      showDetail(center.id);

      // 渲染缩略图（按节点位置）
      const minimapSvg = document.getElementById('minimap-svg');
      const scale = 140 / 1400, scaleY = 88 / 760;
      projects.forEach(p => {
        const pos = positions[p.id];
        if (!pos) return;
        const colorMap = { cat_frontend: '#007aff', cat_backend: '#30d158', cat_ai: '#ff3b30', cat_data: '#ff9f0a', cat_devops: '#5e5ce6', cat_tools: '#8e8e93' };
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', pos.x * scale);
        circle.setAttribute('cy', pos.y * scaleY);
        circle.setAttribute('r', 1.2);
        circle.setAttribute('fill', colorMap[p.category_id] || '#8e8e93');
        // 移除原占位 rect 的最后一根
        minimapSvg.insertBefore(circle, minimapSvg.firstChild);
      });
    })();
  </script>
</body>
</html>
