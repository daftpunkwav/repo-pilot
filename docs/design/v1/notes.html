<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1320">
<title>笔记 · RepoPilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/design-system.css">

<style>
/* ===== Notes Page 专属 ===== */
.notes-shell {
  display: grid;
  grid-template-columns: 280px 1fr 1fr;
  height: 100vh;
  overflow: hidden;
  position: relative;
  z-index: var(--z-content);
}
.notes-shell[data-view="list-only"] { grid-template-columns: 280px 1fr; }
.notes-shell[data-view="list-only"] .edit-pane,
.notes-shell[data-view="list-only"] .preview-pane { display: none; }
.notes-shell[data-view="edit-only"] { grid-template-columns: 280px 1fr; }
.notes-shell[data-view="edit-only"] .preview-pane { display: none; }
.notes-shell[data-view="preview-only"] { grid-template-columns: 280px 1fr; }
.notes-shell[data-view="preview-only"] .edit-pane { display: none; }
.notes-shell[data-view="split"] .notes-grid-view { display: none; }

/* 顶栏 */
.notes-topbar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  padding: 0 20px;
  display: flex; align-items: center; gap: 14px;
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(40px) saturate(180%);
  -webkit-backdrop-filter: blur(40px) saturate(180%);
  border-bottom: 1px solid rgba(255, 255, 255, 0.4);
  box-shadow: inset 0 -1px 0 0 rgba(255, 255, 255, 0.3);
  z-index: 50;
}
[data-theme="dark"] .notes-topbar {
  background: rgba(28, 28, 30, 0.55);
  border-bottom-color: rgba(255,255,255,0.08);
}
.notes-search {
  flex: 1; max-width: 400px;
  display: flex; align-items: center; gap: 8px;
  height: 36px; padding: 0 12px;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 10px;
  color: var(--text-500); font-size: 13px;
}
.notes-search input { flex: 1; border: 0; background: transparent; outline: 0; font: inherit; color: var(--text-800); }
.notes-search input::placeholder { color: var(--text-400); }
.notes-search kbd {
  padding: 1px 5px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 4px;
  font-family: var(--font-mono); font-size: 10px;
}

.view-toggle { display: flex; gap: 2px; padding: 3px; background: rgba(0, 0, 0, 0.04); border-radius: 999px; }
.view-btn {
  display: grid; place-items: center;
  width: 32px; height: 30px;
  border-radius: 999px;
  background: transparent; border: 0;
  color: var(--text-500); cursor: pointer;
  transition: all 0.18s var(--ease);
}
.view-btn:hover { color: var(--text-800); }
.view-btn.active { background: var(--bg-50); color: var(--brand-500); box-shadow: var(--shadow-xs); }
.view-btn svg { width: 14px; height: 14px; }

.topbar-action {
  display: grid; place-items: center;
  width: 36px; height: 36px;
  border-radius: 999px;
  color: var(--text-500);
  border: 0; background: transparent;
  cursor: pointer;
  transition: all 0.18s var(--ease);
}
.topbar-action:hover { background: rgba(0, 0, 0, 0.05); color: var(--text-800); }
.topbar-action svg { width: 16px; height: 16px; }

.save-indicator {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 12px;
  border-radius: 999px;
  font-size: 11px; font-weight: 600;
}
.save-indicator.saving { background: rgba(255, 159, 10, 0.14); color: #b8651b; }
.save-indicator.saved { background: rgba(52, 199, 89, 0.14); color: #1e7e34; }
.save-indicator .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }

/* 左侧笔记列表 */
.notes-list-pane {
  border-right: 1px solid rgba(0, 0, 0, 0.06);
  background: rgba(255, 255, 255, 0.45);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  display: flex; flex-direction: column;
  padding-top: var(--topbar-h);
}
.notes-list-header { padding: 14px 14px 8px; display: flex; align-items: center; justify-content: space-between; }
.notes-list-header h3 { font-size: 13px; font-weight: 700; margin: 0; }
.notes-list-body { flex: 1; overflow-y: auto; padding: 4px 8px 12px; }
.note-card {
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  margin-bottom: 4px;
  transition: all 0.18s var(--ease);
  border: 1px solid transparent;
}
.note-card:hover { background: rgba(0, 0, 0, 0.04); }
.note-card.active {
  background: linear-gradient(135deg, rgba(0, 122, 255, 0.12), rgba(0, 122, 255, 0.04));
  border-color: rgba(0, 122, 255, 0.3);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
}
.note-card-title {
  font-size: 13px; font-weight: 600;
  margin-bottom: 4px;
  line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
}
.note-card-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--text-500);
}
.note-card-meta .dot { width: 3px; height: 3px; border-radius: 999px; background: var(--text-400); }
.note-card-snippet {
  font-size: 11px; color: var(--text-500);
  line-height: 1.5;
  margin-top: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* 笔记卡片视图（list-only） */
.notes-grid-view {
  grid-column: 2 / -1;
  padding: calc(var(--topbar-h) + 24px) 32px 32px;
  overflow-y: auto;
}
.notes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.note-grid-card {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.5);
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s var(--ease-spring);
  min-height: 200px;
  display: flex; flex-direction: column;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
}
.note-grid-card:hover {
  transform: translateY(-3px);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6), var(--shadow-lg);
  border-color: rgba(0, 122, 255, 0.4);
}
.note-grid-card .project-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 10px; font-weight: 700;
  font-family: var(--font-mono);
  margin-bottom: 12px;
  align-self: flex-start;
}
.note-grid-card h4 { font-size: 16px; font-weight: 600; line-height: 1.3; margin: 0 0 8px; letter-spacing: -0.01em; }
.note-grid-card .snippet { font-size: 12px; color: var(--text-500); line-height: 1.6; flex: 1; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
.note-grid-card .meta {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid rgba(0, 0, 0, 0.04);
  font-size: 11px; color: var(--text-400);
  font-family: var(--font-mono);
}

/* 编辑器 */
.edit-pane, .preview-pane {
  display: flex; flex-direction: column;
  min-width: 0;
  padding-top: var(--topbar-h);
}
.edit-pane { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(20px); }
.preview-pane {
  background: rgba(255, 255, 255, 0.3);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(0, 0, 0, 0.06);
}
.edit-toolbar, .preview-toolbar {
  padding: 10px 20px;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  font-size: 11px; color: var(--text-500);
  background: rgba(255, 255, 255, 0.5);
  min-height: 44px;
}
.edit-toolbar-divider { width: 1px; height: 20px; background: rgba(0, 0, 0, 0.08); margin: 0 4px; }
.edit-toolbar-btn {
  display: grid; place-items: center;
  width: 30px; height: 30px;
  border-radius: 8px;
  background: transparent; border: 0;
  color: var(--text-700); cursor: pointer;
  transition: all 0.18s;
  font-weight: 600;
  font-size: 13px;
}
.edit-toolbar-btn:hover { background: rgba(0, 0, 0, 0.06); color: var(--text-800); }
.edit-toolbar-btn.bold { font-weight: 800; }
.edit-toolbar-btn.code { font-family: var(--font-mono); font-size: 11px; }
.preview-toolbar {
  background: linear-gradient(135deg, rgba(0, 122, 255, 0.08), transparent);
  color: var(--brand-700); font-weight: 600;
}
.preview-toolbar .live-dot {
  width: 8px; height: 8px; border-radius: 999px;
  background: var(--brand-500);
  box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.18);
  animation: pulse 1.4s infinite;
}
@keyframes pulse { 50% { opacity: 0.5; transform: scale(0.85); } }

.edit-title-input {
  width: calc(100% - 48px);
  margin: 20px 24px 0;
  padding: 0;
  font-size: 28px; font-weight: 700;
  letter-spacing: -0.02em;
  background: transparent;
  border: 0; outline: 0;
  color: var(--text-800);
}
.edit-title-input::placeholder { color: var(--text-300); }
.edit-content-area {
  flex: 1;
  width: 100%;
  padding: 16px 24px 24px;
  background: transparent;
  border: 0; outline: 0;
  font: 13px/1.75 var(--font-mono);
  color: var(--text-800);
  resize: none;
  line-height: 1.8;
}
.edit-content-area::placeholder { color: var(--text-400); }

.preview-content {
  flex: 1; overflow-y: auto;
  padding: 28px 36px 36px;
  max-width: 820px;
  width: 100%;
  margin: 0 auto;
}
.preview-content h1:first-child,
.preview-content .preview-h1 {
  font-size: 32px; font-weight: 800;
  letter-spacing: -0.025em; line-height: 1.15;
  margin: 0 0 20px;
  background: linear-gradient(135deg, var(--text-800), var(--brand-600));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.empty-notes {
  display: grid; place-items: center;
  height: 100%;
  text-align: center;
  color: var(--text-500);
}
.empty-notes .empty-icon {
  width: 80px; height: 80px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, var(--brand-100), var(--brand-50));
  border-radius: 24px;
  display: grid; place-items: center;
  color: var(--brand-500);
  box-shadow: 0 8px 32px rgba(0, 122, 255, 0.15);
}
.empty-notes h3 { font-size: 18px; font-weight: 600; color: var(--text-700); margin: 0 0 8px; }
.empty-notes p { font-size: 13px; max-width: 320px; line-height: 1.6; margin: 0 0 20px; }

/* 状态条 */
.status-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 28px;
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(0, 0, 0, 0.05);
  font-size: 10px;
  color: var(--text-500);
  font-family: var(--font-mono);
  z-index: 40;
}
.status-bar .left, .status-bar .right { display: flex; align-items: center; gap: 14px; }
.status-bar .right kbd {
  padding: 1px 4px;
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(0, 0, 0, 0.08);
  border-radius: 3px;
  font-size: 9px;
}

/* Toast */
#toast-container {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  z-index: 9999; display: flex; flex-direction: column; gap: 8px; align-items: center;
}
.toast {
  padding: 10px 18px;
  background: rgba(28, 28, 30, 0.92);
  backdrop-filter: blur(20px);
  color: #fff;
  border-radius: 999px;
  font-size: 12px; font-weight: 600;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  animation: toast-in 0.4s var(--ease-spring);
}
@keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* 响应 */
@media (max-width: 1100px) {
  .notes-shell { grid-template-columns: 240px 1fr; }
  .notes-shell .preview-pane { display: none; }
}
@media (max-width: 768px) {
  .notes-shell { grid-template-columns: 1fr; }
  .notes-list-pane { display: none; }
}

.notes-main { display: flex; flex-direction: column; min-width: 0; height: 100vh; }
.notes-main .notes-shell { flex: 1; min-height: 0; }
</style>
</head>
<body data-page="notes">

<script src="./assets/api-mock.js"></script>
<script src="./assets/sidebar.js"></script>
<script src="./assets/topbar.js"></script>
<script src="./assets/app-shell.js"></script>


<!-- Toast 容器 -->
<div id="toast-container"></div>

<!-- 主应用 -->
<div class="app">
  <!-- 侧边栏（由 sidebar.js 渲染） -->
  <div id="app-sidebar"></div>

  <!-- 笔记编辑器（原生 DOM 结构 · JS 仅负责状态/事件） -->
  <div id="app">
    <div class="notes-main">
      <div class="notes-shell" id="notes-shell" data-view="split">

        <!-- 顶栏 -->
        <header class="notes-topbar">
          <div class="notes-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input id="nt-search" type="text" placeholder="搜索笔记标题、内容..." />
            <kbd>&#8984;K</kbd>
          </div>

          <button id="nt-new" class="btn btn-primary btn-sm" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            新建笔记
          </button>

          <div class="view-toggle" role="tablist">
            <button class="view-btn" data-view="list-only" title="列表视图">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
            </button>
            <button class="view-btn active" data-view="split" title="分屏编辑+预览">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="18" rx="1"/><rect x="13" y="3" width="8" height="18" rx="1"/></svg>
            </button>
            <button class="view-btn" data-view="edit-only" title="仅编辑">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </button>
            <button class="view-btn" data-view="preview-only" title="仅预览">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>

          <div id="nt-save" class="save-indicator saved" style="display:none;">
            <span class="dot"></span>
            <span id="nt-save-label">已就绪</span>
          </div>

          <button id="nt-theme" class="topbar-action" title="切换主题" type="button">
            <svg id="nt-theme-ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
            <svg id="nt-theme-ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </button>
          <button id="nt-del" class="topbar-action" title="删除笔记" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>
          </button>
        </header>

        <!-- 左侧笔记列表 -->
        <aside class="notes-list-pane">
          <div class="notes-list-header">
            <h3>笔记</h3>
            <span class="badge" id="nt-list-count" style="font-family:var(--font-mono)">0</span>
          </div>
          <div class="notes-list-body" id="nt-list"></div>
        </aside>

        <!-- 主内容区：列表视图（仅在 list-only 模式显示） -->
        <main class="notes-grid-view" id="nt-grid">
          <div class="row between mb-md">
            <div>
              <h2 class="h2" style="margin:0">所有笔记</h2>
              <p class="muted small mt-sm"><span id="nt-grid-count">0</span> 篇笔记 · 跨 <span id="nt-grid-projects">0</span> 个项目</p>
            </div>
            <button class="btn btn-primary" id="nt-new-2" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              新建笔记
            </button>
          </div>
          <div id="nt-grid-body"></div>
        </main>

        <!-- 编辑器 -->
        <section class="edit-pane">
          <div class="edit-toolbar">
            <button class="edit-toolbar-btn bold" data-insert="**粗体**" title="加粗 (Ctrl+B)"><strong>B</strong></button>
            <button class="edit-toolbar-btn" data-insert="*斜体*" title="斜体 (Ctrl+I)"><em>I</em></button>
            <div class="edit-toolbar-divider"></div>
            <button class="edit-toolbar-btn" data-insert="## 标题" title="标题">H</button>
            <button class="edit-toolbar-btn" data-insert="- 列表项" title="列表">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            </button>
            <button class="edit-toolbar-btn" data-insert="&gt; 引用" title="引用">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M3 21c3 0 7-1 7-8V5a2 2 0 00-2-2H4a2 2 0 00-2 2v6c0 1.5 1 2 2 2h2M15 21c3 0 7-1 7-8V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v6c0 1.5 1 2 2 2h2"/></svg>
            </button>
            <button class="edit-toolbar-btn code" data-insert="`code`" title="行内代码">&#8249;/&#8250;</button>
            <button class="edit-toolbar-btn" data-insert="```&#10;&#10;```" title="代码块">{ }</button>
            <div class="edit-toolbar-divider"></div>
            <button class="edit-toolbar-btn" data-insert="[文本](url)" title="链接">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
            </button>
            <div style="flex:1"></div>
            <span class="muted" id="nt-word-count" style="font-family:var(--font-mono);font-size:11px">0 字</span>
          </div>
          <div id="nt-edit-active" style="display:flex;flex-direction:column;flex:1;min-height:0;">
            <input id="nt-title" class="edit-title-input" placeholder="无标题笔记" />
            <textarea id="nt-content" class="edit-content-area" placeholder="开始用 Markdown 记录..." spellcheck="false"></textarea>
          </div>
          <div id="nt-edit-empty" class="empty-notes" style="display:none;">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h5"/></svg>
            </div>
            <h3>选择一篇笔记开始</h3>
            <p>从左侧列表选择，或创建新笔记</p>
            <button class="btn btn-primary" id="nt-new-3" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
              新建笔记
            </button>
          </div>
        </section>

        <!-- 预览 -->
        <section class="preview-pane">
          <div class="preview-toolbar">
            <span class="live-dot"></span>
            <span>实时预览</span>
            <span style="margin-left:8px;font-weight:400;color:var(--text-500)">Markdown · 实时渲染</span>
          </div>
          <div id="nt-preview" class="preview-content markdown"></div>
        </section>

        <!-- 状态栏 -->
        <div class="status-bar">
          <div class="left">
            <span><span id="nt-status-count">0</span> 笔记</span>
            <span>·</span>
            <span id="nt-status-current">未选择</span>
          </div>
          <div class="right">
            <span>Markdown · 实时预览</span>
            <span><kbd>&#8984;</kbd>+<kbd>S</kbd> 保存</span>
            <span><kbd>&#8984;</kbd>+<kbd>B</kbd> 加粗</span>
            <span><kbd>&#8984;</kbd>+<kbd>/</kbd> 切换视图</span>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>


<!-- marked (markdown 渲染) -->
<script src="https://unpkg.com/marked@11.1.1/marked.min.js"></script>

<script>
'use strict';

/* ==========================================================================
   RepoPilot 笔记页面 · 原生 JS 实现（替代原 Vue 版本）
   --------------------------------------------------------------------------
   功能：
     - 笔记列表（左侧）+ 编辑器 + 实时预览（默认分屏）
     - 视图切换：list-only / split / edit-only / preview-only
     - 搜索过滤（标题/内容/项目名）
     - 新建/删除/保存
     - 主题切换（与全局 rp_theme 联动）
     - 编辑器工具栏插入（粗体、斜体、标题、列表、引用、代码、链接）
     - 键盘快捷键：⌘/Ctrl+S、⌘/Ctrl+B、⌘/Ctrl+/、⌘/Ctrl+N
     - URL 参数：
         ?note=xxx             → 自动打开指定笔记
         ?project=xxx&new=1    → 自动新建并关联到项目
         ?project=xxx&generate=1 → Scribe 生成大纲
   ========================================================================== */

(async function () {
  const api = await RP.ensureApiClient();
  RP.applyTheme();

  // ---------- 工具函数 ----------
  const $ = (id) => document.getElementById(id);
  const stripMarkdown = (md) => md
    .replace(/```[\s\S]*?```/g, '')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/^#+\s*/gm, '')
    .replace(/\*\*([^*]+)\*\*/g, '$1')
    .replace(/\*([^*]+)\*/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/^[\s>\-*+]+/gm, '')
    .replace(/\n+/g, ' ')
    .trim();
  const snippet = (md, max) => stripMarkdown(md).slice(0, max || 150);
  const wordCount = (md) => stripMarkdown(md).length;
  const formatDate = (iso) => {
    if (!iso) return '-';
    const d = new Date(iso);
    const diff = Date.now() - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + ' 分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + ' 小时前';
    if (diff < 604800000) return Math.floor(diff / 86400000) + ' 天前';
    return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
  };
  const escapeHtml = (s) => (s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

  // ---------- 状态 ----------
  const state = {
    notes: [],
    current: null,
    search: '',
    view: 'split', // split | list-only | edit-only | preview-only
    saveStatus: 'saved',
    saveTimer: null,
    theme: localStorage.getItem('rp_theme') || 'light',
    notesByProject: {} // projectId -> count
  };

  // ---------- 加载数据 ----------
  state.notes = ((await api.listAllNotes()).data || []).slice();
  state.notes.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

  // 统计项目笔记数
  state.notesByProject = state.notes.reduce((acc, n) => {
    acc[n.project_id] = (acc[n.project_id] || 0) + 1;
    return acc;
  }, {});

  // ---------- 渲染 ----------
  function filtered() {
    if (!state.search) return state.notes;
    const q = state.search.toLowerCase();
    return state.notes.filter(n =>
      (n.title || '').toLowerCase().includes(q) ||
      (n.content || '').toLowerCase().includes(q) ||
      (n.project_name || '').toLowerCase().includes(q)
    );
  }

  function renderList() {
    const list = $('nt-list');
    const items = filtered();
    if (items.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-400);font-size:12px;">' +
        (state.search ? '没有匹配的笔记' : '还没有笔记 · 去项目详细页创建') + '</div>';
    } else {
      list.innerHTML = items.map(n => `
        <div class="note-card ${state.current && state.current.id === n.id ? 'active' : ''}" data-id="${n.id}">
          <div class="note-card-title">${escapeHtml(n.title || '未命名笔记')}</div>
          <div class="note-card-meta">
            <span class="note-card-project" style="color:${n.project_color || 'var(--text-500)'};font-weight:600">${escapeHtml(n.project_name || '')}</span>
            <span class="dot"></span>
            <span>${formatDate(n.updated_at)}</span>
          </div>
          <div class="note-card-snippet">${escapeHtml(snippet(n.content || ''))}</div>
        </div>
      `).join('');
    }
    $('nt-list-count').textContent = items.length;
    $('nt-status-count').textContent = items.length;

    // 绑定 click
    list.querySelectorAll('.note-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.getAttribute('data-id');
        const n = state.notes.find(x => x.id === id);
        if (n) openNote(n);
      });
    });
  }

  function renderGrid() {
    const items = filtered();
    const grid = $('nt-grid-body');
    $('nt-grid-count').textContent = items.length;
    $('nt-grid-projects').textContent = new Set(items.map(n => n.project_id)).size;
    if (items.length === 0) {
      grid.innerHTML = `
        <div class="empty-notes">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h5"/></svg>
          </div>
          <h3>还没有笔记</h3>
          <p>开始记录你的开源项目学习心得</p>
          <button class="btn btn-primary" id="nt-new-empty" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            新建笔记
          </button>
        </div>`;
      $('nt-new-empty')?.addEventListener('click', createNote);
      return;
    }
    grid.innerHTML = '<div class="notes-grid">' + items.map(n => `
      <div class="note-grid-card" data-id="${n.id}">
        <span class="project-tag" style="background:${(n.project_color || '#007aff')}20;color:${n.project_color || '#007aff'}">${escapeHtml(n.project_name || '')}</span>
        <h4>${escapeHtml(n.title || '未命名笔记')}</h4>
        <div class="snippet">${escapeHtml(snippet(n.content || '', 200))}</div>
        <div class="meta">
          <span>${formatDate(n.updated_at)}</span>
          <span>${wordCount(n.content || '')} 字</span>
        </div>
      </div>
    `).join('') + '</div>';
    grid.querySelectorAll('.note-grid-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.getAttribute('data-id');
        const n = state.notes.find(x => x.id === id);
        if (n) { openNote(n); setView('split'); }
      });
    });
  }

  function renderEditor() {
    const titleInput = $('nt-title');
    const contentArea = $('nt-content');
    const empty = $('nt-edit-empty');
    const active = $('nt-edit-active');
    if (state.current) {
      empty.style.display = 'none';
      active.style.display = 'flex';
      // 只有在失焦时才更新 DOM 值，避免破坏正在输入的 caret
      if (document.activeElement !== titleInput) titleInput.value = state.current.title || '';
      if (document.activeElement !== contentArea) contentArea.value = state.current.content || '';
      $('nt-word-count').textContent = (wordCount(state.current.content || '')) + ' 字';
    } else {
      empty.style.display = '';
      active.style.display = 'none';
      $('nt-word-count').textContent = '0 字';
    }
  }

  function renderPreview() {
    const preview = $('nt-preview');
    if (!state.current) {
      preview.innerHTML = `
        <div class="empty-notes" style="height:auto;padding:80px 0;">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
          </div>
          <h3>预览区</h3>
          <p>从左侧选择笔记，或新建一篇开始</p>
        </div>`;
      return;
    }
    try {
      const md = state.current.content || '';
      preview.innerHTML = window.marked ? window.marked.parse(md) : escapeHtml(md);
    } catch (err) {
      preview.innerHTML = '<pre>' + escapeHtml(state.current.content || '') + '</pre>';
    }
  }

  function renderSave() {
    const save = $('nt-save');
    if (!state.current) { save.style.display = 'none'; return; }
    save.style.display = '';
    save.className = 'save-indicator ' + state.saveStatus;
    const label = $('nt-save-label');
    label.textContent = state.saveStatus === 'saving' ? '保存中...' :
                        state.saveStatus === 'saved'  ? '已保存 · ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) :
                        '已就绪';
  }

  function renderStatusBar() {
    $('nt-status-current').textContent = state.current ? (state.current.title || '无标题') : '未选择';
  }

  function setView(v) {
    state.view = v;
    const shell = $('notes-shell');
    shell.setAttribute('data-view', v);
    // 更新 view-btn active
    document.querySelectorAll('.view-btn').forEach(b => {
      b.classList.toggle('active', b.getAttribute('data-view') === v);
    });
    // grid 与 split/edit-only/preview-only 互斥
    const grid = $('nt-grid');
    if (v === 'list-only') {
      grid.style.display = '';
      renderGrid();
    } else {
      grid.style.display = 'none';
    }
  }

  function renderAll() {
    renderList();
    renderEditor();
    renderPreview();
    renderSave();
    renderStatusBar();
    if (state.view === 'list-only') renderGrid();
  }

  // ---------- 操作 ----------
  function openNote(n) {
    state.current = n;
    if (state.view === 'list-only') setView('split');
    renderAll();
  }

  function createNote(projectInfo) {
    const pi = projectInfo || { id: 'p_react', name: 'facebook/react', color: '#61dafb' };
    const newNote = {
      id: 'n_' + Date.now(),
      project_id: pi.id,
      project_name: pi.name,
      project_color: pi.color,
      title: '',
      content: '# 新笔记\n\n',
      updated_at: new Date().toISOString(),
      created_at: new Date().toISOString()
    };
    state.notes.unshift(newNote);
    state.notesByProject[pi.id] = (state.notesByProject[pi.id] || 0) + 1;
    state.current = newNote;
    if (state.view === 'list-only') setView('split');
    markChanged();
    setTimeout(() => {
      const t = $('nt-title');
      if (t) { t.focus(); t.select(); }
    }, 50);
    RP.toast('新笔记已创建', 'success');
    renderAll();
  }

  function delNote() {
    if (!state.current) return;
    if (!confirm(`确定删除「${state.current.title || '未命名'}」？`)) return;
    const idx = state.notes.findIndex(n => n.id === state.current.id);
    if (idx < 0) return;
    state.notes.splice(idx, 1);
    state.notesByProject[state.current.project_id] = Math.max(0, (state.notesByProject[state.current.project_id] || 1) - 1);
    state.current = state.notes[0] || null;
    RP.toast('已删除', 'success');
    renderAll();
  }

  function markChanged() {
    state.saveStatus = 'saving';
    renderSave();
    clearTimeout(state.saveTimer);
    state.saveTimer = setTimeout(() => {
      if (state.current) {
        state.current.updated_at = new Date().toISOString();
        // 这里调用 api.updateNote 即可同步到后端
        api.updateNote(state.current.id, {
          title: state.current.title,
          content: state.current.content
        }).catch(() => { /* mock 永远成功 */ });
      }
      state.saveStatus = 'saved';
      renderSave();
      renderList(); // 更新左侧时间
      renderStatusBar();
    }, 500);
  }

  function insertAtCursor(text) {
    const ta = $('nt-content');
    if (!ta || !state.current) return;
    const s = ta.selectionStart, end = ta.selectionEnd;
    const before = state.current.content.slice(0, s);
    const after = state.current.content.slice(end);
    state.current.content = before + text + after;
    ta.value = state.current.content;
    markChanged();
    renderPreview();
    setTimeout(() => {
      ta.focus();
      const newPos = s + text.length;
      ta.setSelectionRange(newPos, newPos);
    }, 0);
  }

  function toggleTheme() {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', state.theme);
    localStorage.setItem('rp_theme', state.theme);
    $('nt-theme-ic-sun').style.display = state.theme === 'dark' ? '' : 'none';
    $('nt-theme-ic-moon').style.display = state.theme === 'dark' ? 'none' : '';
  }

  // ---------- 事件绑定 ----------
  // 搜索
  let searchTimer;
  $('nt-search').addEventListener('input', (e) => {
    state.search = e.target.value;
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      renderList();
      if (state.view === 'list-only') renderGrid();
    }, 100);
  });

  // 新建按钮
  $('nt-new').addEventListener('click', () => createNote());
  $('nt-new-2')?.addEventListener('click', () => createNote());
  $('nt-new-3')?.addEventListener('click', () => createNote());

  // 视图切换
  document.querySelectorAll('.view-btn').forEach(b => {
    b.addEventListener('click', () => setView(b.getAttribute('data-view')));
  });

  // 编辑器工具栏
  document.querySelectorAll('[data-insert]').forEach(b => {
    b.addEventListener('click', () => insertAtCursor(b.getAttribute('data-insert')));
  });

  // 主题切换
  $('nt-theme').addEventListener('click', toggleTheme);

  // 删除
  $('nt-del').addEventListener('click', delNote);

  // 标题 / 内容变化
  $('nt-title').addEventListener('input', (e) => {
    if (!state.current) return;
    state.current.title = e.target.value;
    markChanged();
    renderStatusBar();
  });
  $('nt-content').addEventListener('input', (e) => {
    if (!state.current) return;
    state.current.content = e.target.value;
    markChanged();
    renderPreview();
    $('nt-word-count').textContent = wordCount(state.current.content) + ' 字';
  });

  // Tab 键缩进
  $('nt-content').addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      insertAtCursor('  ');
    }
  });

  // 全局快捷键
  window.addEventListener('keydown', (e) => {
    const cmd = e.metaKey || e.ctrlKey;
    if (cmd && e.key === 's') {
      e.preventDefault();
      if (state.current) {
        state.current.updated_at = new Date().toISOString();
        api.updateNote(state.current.id, { title: state.current.title, content: state.current.content });
        state.saveStatus = 'saved';
        renderSave();
        RP.toast('已保存', 'success');
      }
    }
    if (cmd && e.key === '/') {
      e.preventDefault();
      const modes = ['split', 'edit-only', 'preview-only', 'list-only'];
      const idx = modes.indexOf(state.view);
      setView(modes[(idx + 1) % modes.length]);
    }
    if (cmd && e.key === 'b' && document.activeElement === $('nt-content')) {
      e.preventDefault();
      insertAtCursor('**粗体**');
    }
    if (cmd && e.key === 'n') {
      e.preventDefault();
      createNote();
    }
  });

  // ---------- URL 参数处理 ----------
  const noteId = RP.getQueryParam('note');
  const projectId = RP.getQueryParam('project');
  const wantNew = RP.getQueryParam('new') === '1';
  const wantGenerate = RP.getQueryParam('generate') === '1';

  if (noteId) {
    const target = state.notes.find(n => n.id === noteId);
    if (target) state.current = target;
  }

  if (projectId && (wantNew || wantGenerate)) {
    const p = (await api.getProject(projectId)).data;
    createNote({ id: p.id, name: p.name, color: '' });
    if (wantGenerate) {
      const outline = `# ${p.name} 学习大纲

## 1. 项目概览
- 项目地址：${p.url || '-'}
- 主语言：${p.language || '-'}
- Stars：${RP.formatNumber(p.stars || 0)}

## 2. 核心功能
${(p.description || '').slice(0, 200)}

## 3. 源码导读
- 阅读入口：README.md
- 关键目录：（待补充）

## 4. 实践计划
- [ ] 搭建本地环境
- [ ] 完成官方 Quick Start
- [ ] 写一篇 demo 笔记
- [ ] 整理 5 个核心 API

> 由 Scribe Agent 自动生成 · ${new Date().toLocaleDateString('zh-CN')}
`;
      state.current.title = `${p.name} 学习大纲`;
      state.current.content = outline;
      $('nt-title').value = state.current.title;
      $('nt-content').value = state.current.content;
      markChanged();
      RP.toast('已生成笔记大纲', 'success');
    } else {
      // 仅新建空笔记，不立刻让用户填标题，等他们点进编辑器
      setTimeout(() => {
        const noteName = prompt(`为 ${p.name} 创建笔记：输入标题`, `${(p.name.split('/')[1] || p.name)} 学习笔记`);
        if (noteName) {
          state.current.title = noteName;
          $('nt-title').value = noteName;
          markChanged();
          RP.toast(`已创建笔记：${noteName}`, 'success');
        }
      }, 200);
    }
  }

  // 默认选中第一篇
  if (!state.current && state.notes.length > 0) state.current = state.notes[0];

  // 初始化主题图标
  $('nt-theme-ic-sun').style.display = state.theme === 'dark' ? '' : 'none';
  $('nt-theme-ic-moon').style.display = state.theme === 'dark' ? 'none' : '';

  renderAll();

  console.log('[RepoPilot Notes] App initialized,', state.notes.length, 'notes loaded');
})();
</script>

</body>
