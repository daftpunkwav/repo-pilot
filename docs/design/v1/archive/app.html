<html lang="zh-CN">
<head>

<title>RepoPilot · AI 开源项目学习领航员</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  /* ===== App.html 局部样式（液态玻璃组件变体） ===== */
  .overview-hero {
    position: relative;
    padding: 32px;
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .overview-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(0,122,255,0.12), transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(191,90,242,0.12), transparent 50%);
    pointer-events: none;
  }
  .overview-hero > * { position: relative; z-index: 1; }

  /* 总览页：分类分布条形图 */
  .dist-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(0,0,0,0.04);
  }
  .dist-bar:last-child { border-bottom: 0; }
  .dist-label { width: 100px; font-size: 12px; font-weight: 600; }
  .dist-track { flex: 1; height: 8px; background: rgba(0,0,0,0.05); border-radius: 999px; overflow: hidden; }
  .dist-fill { height: 100%; border-radius: 999px; }
  .dist-val { width: 40px; text-align: right; font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--text-700); }

  /* 笔记编辑器 */
  .note-shell { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - var(--topbar-h)); }
  .note-list-col { background: rgba(255,255,255,0.5); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); border-right: 1px solid rgba(0,0,0,0.06); padding: 16px 12px; overflow-y: auto; }
  .note-list-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; transition: all 0.18s; }
  .note-list-item:hover { background: rgba(0,0,0,0.04); }
  .note-list-item.active { background: linear-gradient(135deg, rgba(0,122,255,0.12), rgba(0,122,255,0.04)); border-left: 3px solid var(--brand-500); padding-left: 9px; }
  .note-title-mini { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .note-meta-mini { font-size: 11px; color: var(--text-500); display: flex; gap: 6px; align-items: center; }
  .note-editor-col { display: flex; flex-direction: column; min-width: 0; }
  .note-toolbar { padding: 8px 16px; border-bottom: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.5); backdrop-filter: blur(20px); display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-500); }
  .save-status { margin-left: auto; font-weight: 600; }
  .save-status.saving { color: var(--warning); }
  .save-status.saved { color: var(--success); }
  .note-edit-pane, .note-preview-pane { padding: 24px 32px; overflow-y: auto; min-height: 100%; }
  .note-editor-col { display: grid; grid-template-rows: auto 1fr; }
  .note-split { display: grid; grid-template-columns: 1fr 1fr; min-height: 0; flex: 1; }
  .note-edit-pane { border-right: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.4); }
  .note-preview-pane { background: rgba(255,255,255,0.3); backdrop-filter: blur(20px); }
  .note-title-input { width: 100%; font-size: 24px; font-weight: 700; border: 0; outline: 0; background: transparent; padding: 0; margin-bottom: 16px; letter-spacing: -0.01em; }
  .note-content-input { width: 100%; min-height: 60vh; border: 0; outline: 0; background: transparent; font: 13px/1.7 var(--font-mono); color: var(--text-800); resize: none; padding: 0; }
  .note-empty { display: grid; place-items: center; padding: 80px 24px; }
  .note-empty-icon { width: 72px; height: 72px; margin: 0 auto 16px; opacity: 0.5; }
  .kb { padding: 1px 5px; background: rgba(0,0,0,0.06); border-radius: 4px; font-family: var(--font-mono); font-size: 10px; }

  /* Agent 反问组件 */
  .agent-shell-full { display: grid; grid-template-columns: 240px 300px 1fr; height: calc(100vh - var(--topbar-h)); }
  .session-list-col { background: rgba(255,255,255,0.5); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border-right: 1px solid rgba(255,255,255,0.4); display: flex; flex-direction: column; }
  .session-list-head { padding: 14px; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .session-list-body { flex: 1; overflow-y: auto; padding: 8px; }
  .session-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; margin-bottom: 4px; transition: all 0.18s; }
  .session-item:hover { background: rgba(0,0,0,0.04); }
  .session-item.active { background: linear-gradient(135deg, rgba(0,122,255,0.15), rgba(0,122,255,0.06)); border-left: 3px solid var(--brand-500); padding-left: 9px; }
  .session-item-title { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .session-item-meta { display: flex; gap: 6px; align-items: center; font-size: 10px; color: var(--text-400); }
  .session-tabs { display: flex; gap: 4px; padding: 8px 12px; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .session-tab { padding: 4px 10px; font-size: 11px; font-weight: 600; color: var(--text-500); border-radius: 999px; cursor: pointer; }
  .session-tab.active { background: rgba(0,0,0,0.06); color: var(--text-800); }
  .unread-dot { width: 7px; height: 7px; border-radius: 999px; background: var(--brand-500); flex-shrink: 0; }

  .chat-area { display: flex; flex-direction: column; min-width: 0; background: rgba(255,255,255,0.35); backdrop-filter: blur(20px); }
  .chat-header { padding: 12px 20px; border-bottom: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.5); display: flex; align-items: center; gap: 16px; }
  .agent-switcher { display: flex; gap: 4px; padding: 5px 6px; background: rgba(0,0,0,0.04); border-radius: 999px; }
  .agent-avatar { width: 32px; height: 32px; border-radius: 8px; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 13px; cursor: pointer; position: relative; transition: transform 0.18s var(--ease-spring); }
  .agent-avatar:hover { transform: translateY(-1px); }
  .agent-avatar.active { box-shadow: 0 0 0 2px var(--bg-50), 0 0 0 4px var(--brand-500); }
  .agent-hub       { background: linear-gradient(135deg, #4a3aff, #9d4edd); }
  .agent-scout     { background: linear-gradient(135deg, #ff9f0a, #ff6f00); }
  .agent-mentor    { background: linear-gradient(135deg, #9d4edd, #c879ff); }
  .agent-navigator { background: linear-gradient(135deg, #00b8d4, #00d4aa); }
  .agent-curator   { background: linear-gradient(135deg, #34c759, #30d158); }
  .agent-scribe    { background: linear-gradient(135deg, #ff375f, #ff6b8a); }

  .chat-messages { flex: 1; overflow-y: auto; padding: 32px 20px; display: flex; flex-direction: column; gap: 20px; }
  .msg { display: flex; gap: 12px; max-width: 760px; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .msg-body { flex: 1; min-width: 0; }
  .msg-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .msg-name { font-size: 13px; font-weight: 700; }
  .msg-time { font-size: 11px; color: var(--text-400); }
  .msg-content { background: rgba(255,255,255,0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); border-radius: 14px; padding: 14px 16px; font-size: 13px; line-height: 1.6; }
  .msg-routing { font-size: 11px; color: var(--brand-700); background: rgba(0,122,255,0.1); padding: 4px 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 6px; }
  .msg-user { flex-direction: row-reverse; align-self: flex-end; max-width: 600px; }
  .msg-user .msg-avatar { background: linear-gradient(135deg, #5e5ce6, #bf5af2); }
  .msg-user .msg-body { text-align: right; }
  .msg-user .msg-head { justify-content: flex-end; }

  .msg-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .quick-btn { padding: 6px 12px; background: rgba(255,255,255,0.5); backdrop-filter: blur(10px); border: 1px solid rgba(0,0,0,0.06); border-radius: 999px; font-size: 11px; font-weight: 600; color: var(--text-700); cursor: pointer; }
  .quick-btn:hover { background: rgba(255,255,255,0.8); }

  .question-panel { background: rgba(255,255,255,0.7); backdrop-filter: blur(30px); border: 2px solid var(--brand-500); border-radius: 14px; padding: 18px; margin-top: 8px; box-shadow: var(--shadow-md); }
  .question-item { padding: 12px 0; border-top: 1px dashed rgba(0,0,0,0.08); }
  .question-item:first-of-type { border-top: 0; padding-top: 0; }
  .question-text { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
  .radio-option { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; cursor: pointer; transition: all 0.18s; margin-bottom: 6px; background: rgba(255,255,255,0.4); }
  .radio-option:hover { background: rgba(255,255,255,0.7); border-color: var(--brand-300); }
  .radio-option.selected { border-color: var(--brand-500); background: rgba(0,122,255,0.06); }
  .radio-dot { width: 16px; height: 16px; border-radius: 999px; border: 2px solid rgba(0,0,0,0.2); flex-shrink: 0; margin-top: 2px; display: grid; place-items: center; }
  .radio-option.selected .radio-dot { border-color: var(--brand-500); }
  .radio-dot::after { content: ''; width: 8px; height: 8px; border-radius: 999px; background: var(--brand-500); opacity: 0; }
  .radio-option.selected .radio-dot::after { opacity: 1; }
  .radio-label { font-size: 13px; font-weight: 600; }
  .radio-desc { font-size: 11px; color: var(--text-500); margin-top: 2px; }
  .km-check { width: 16px; height: 16px; border-radius: 4px; border: 2px solid rgba(0,0,0,0.2); flex-shrink: 0; display: grid; place-items: center; }
  .km-check.checked { background: var(--brand-500); border-color: var(--brand-500); color: #fff; }

  .chat-input-wrap { padding: 16px 20px 20px; border-top: 1px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.5); backdrop-filter: blur(20px); }
  .chat-input { background: rgba(255,255,255,0.7); border: 1px solid rgba(0,0,0,0.08); border-radius: 14px; padding: 12px 14px; transition: all 0.18s; }
  .chat-input:focus-within { border-color: var(--brand-500); box-shadow: 0 0 0 3px rgba(0,122,255,0.12); background: rgba(255,255,255,0.9); }
  .chat-textarea { width: 100%; min-height: 44px; max-height: 180px; border: 0; outline: 0; background: transparent; font: inherit; color: var(--text-800); resize: none; }
  .send-btn { width: 34px; height: 34px; border-radius: 999px; background: linear-gradient(135deg, var(--brand-500), var(--brand-600)); color: #fff; border: 0; display: grid; place-items: center; cursor: pointer; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .streaming-cursor { display: inline-block; width: 7px; height: 14px; background: currentColor; vertical-align: middle; margin-left: 2px; animation: blink 1s infinite; opacity: 0.7; }
  @keyframes blink { 50% { opacity: 0; } }

  /* 图谱 */
  .graph-stage { position: relative; height: calc(100vh - var(--topbar-h) - 100px); border-radius: var(--radius-lg); overflow: hidden; background: rgba(255,255,255,0.5); backdrop-filter: blur(30px); border: 1px solid rgba(255,255,255,0.5); }
  .graph-toolbar { position: absolute; top: 16px; left: 16px; right: 16px; display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); border-radius: 14px; padding: 12px 16px; box-shadow: var(--shadow-sm); z-index: 5; }
  .graph-statusbar { position: absolute; bottom: 16px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); border-radius: 14px; padding: 8px 16px; font-size: 11px; color: var(--text-500); box-shadow: var(--shadow-sm); z-index: 5; }
  .node-tooltip { position: absolute; pointer-events: none; background: rgba(28,28,30,0.92); backdrop-filter: blur(20px); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 11px; box-shadow: var(--shadow-md); opacity: 0; transition: opacity 0.15s; z-index: 7; }
  .node-tooltip.visible { opacity: 1; }
  .node-tooltip strong { font-family: var(--font-mono); display: block; margin-bottom: 4px; }
  .node-circle { cursor: pointer; transition: all 0.2s; }
  .node-circle:hover { filter: brightness(1.15); }
  .node-label { font-family: var(--font-mono); font-size: 10px; fill: var(--text-800); text-anchor: middle; pointer-events: none; }
  .edge { fill: none; stroke-linecap: round; opacity: 0.5; }

  /* Toast */
  #toast-container { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast { padding: 12px 20px; background: rgba(28,28,30,0.92); backdrop-filter: blur(20px); color: #fff; border-radius: 999px; font-size: 13px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.3); animation: toast-in 0.4s var(--ease-spring); white-space: nowrap; }
  @keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* 主页 grid */
  .overview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .recent-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }

  /* 进度追踪环 */
  .progress-ring { transform: rotate(-90deg); }
  .progress-ring-circle { transition: stroke-dashoffset 0.5s var(--ease-spring); }

  /* 笔记空状态 */
  .empty-note { display: grid; place-items: center; height: 100%; text-align: center; }

  /* 响应 */
  @media (max-width: 1100px) {
    .overview-grid { grid-template-columns: repeat(2, 1fr); }
    .recent-grid { grid-template-columns: 1fr; }
    .agent-shell-full { grid-template-columns: 1fr; }
    .session-list-col { display: none; }
    .note-shell { grid-template-columns: 1fr; }
  }
</style>

<div id="toast-container"></div>

<script>
'use strict';
const { createApp, ref, reactive, computed, watch, onMounted, nextTick, onBeforeUnmount, h } = Vue;

// ==========================================================================
// 1. 极简 Hash 路由（不依赖 Vue Router，避免任何边界问题）
// ==========================================================================
const ROUTES = [
  { pattern: /^\/$/,                          name: 'overview' },
  { pattern: /^\/projects$/,                  name: 'projects' },
  { pattern: /^\/projects\/([^/]+)$/,         name: 'project-detail', params: ['id'] },
  { pattern: /^\/notes$/,                     name: 'notes' },
  { pattern: /^\/notes\/([^/]+)$/,            name: 'note-edit', params: ['id'] },
  { pattern: /^\/agent$/,                     name: 'agent' },
  { pattern: /^\/graph$/,                     name: 'graph' },
  { pattern: /^\/settings$/,                  name: 'settings' },
  { pattern: /^\/login$/,                     name: 'login', public: true },
  { pattern: /^\/register$/,                  name: 'register', public: true }
];

function parseHash() {
  const hash = (window.location.hash || '#/').slice(1) || '/';
  for (const route of ROUTES) {
    const m = hash.match(route.pattern);
    if (m) {
      const params = {};
      (route.params || []).forEach((k, i) => params[k] = decodeURIComponent(m[i + 1]));
      return { name: route.name, params, hash };
    }
  }
  return { name: 'overview', params: {}, hash };
}

function navigate(path) {
  if (!path.startsWith('#')) path = '#' + path;
  if (window.location.hash === path) {
    // 强制刷新（处理相同 hash 但参数变化）
    window.dispatchEvent(new Event('hashchange'));
  } else {
    window.location.hash = path;
  }
}

window.addEventListener('hashchange', () => {
  const r = parseHash();
  store.route = r;
});

// ==========================================================================
// 2. 全局 Store
// ==========================================================================
const api = new window.ApiClient();
const toast = (msg, type = 'info') => {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.background = type === 'error' ? 'rgba(255,59,48,0.92)' : type === 'success' ? 'rgba(52,199,89,0.92)' : 'rgba(28,28,30,0.92)';
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2400);
};

const store = reactive({
  user: null,
  settings: null,
  categories: [],
  tags: [],
  isAuth: !!localStorage.getItem('rp_token'),
  theme: localStorage.getItem('rp_theme') || 'light',
  route: parseHash()
});

watch(() => store.theme, (v) => {
  document.documentElement.setAttribute('data-theme', v);
  localStorage.setItem('rp_theme', v);
});

async function loadBootstrap() {
  if (!store.isAuth) return;
  try {
    store.user = (await api.me()).data;
    store.settings = (await api.getSettings()).data;
    store.categories = (await api.listCategories()).data;
    store.tags = (await api.listTags()).data;
    store.theme = store.settings.theme || 'light';
  } catch (e) {
    console.warn('Bootstrap failed', e);
    store.isAuth = false;
    api.setToken(null);
  }
}

// ==========================================================================
// 3. 图标（内联 SVG）
// ==========================================================================
const Icon = {
  overview: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>',
  projects: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 12l9 4 9-4M3 17l9 4 9-4"/></svg>',
  agent: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-3-6.7L21 4v5h-5"/><circle cx="12" cy="12" r="3"/></svg>',
  graph: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2.5"/><circle cx="18" cy="6" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M8 7l8 0M7 8l4 8M17 8l-4 8"/></svg>',
  notes: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h5"/></svg>',
  settings: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.1-1.3l2-1.5-2-3.4-2.4.8a7 7 0 00-2.2-1.3L14 3h-4l-.3 2.3a7 7 0 00-2.2 1.3l-2.4-.8-2 3.4 2 1.5a7 7 0 000 2.6l-2 1.5 2 3.4 2.4-.8a7 7 0 002.2 1.3L10 21h4l.3-2.3a7 7 0 002.2-1.3l2.4.8 2-3.4-2-1.5c.1-.4.1-.9.1-1.3z"/></svg>',
  search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
  bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0112 0v5l1.5 3h-15L6 13V8z"/><path d="M10 19a2 2 0 004 0"/></svg>',
  help: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>',
  send: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12l14 0M13 5l7 7-7 7"/></svg>',
  eye: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>',

const Topbar = {
  template: `
    <header class="topbar">
      <div class="topbar-crumb">
        <span v-for="(c, i) in crumbs" :key="i">
          <a v-if="c.to" :href="'#' + c.to" style="color:var(--text-500)">{{ c.label }}</a>
          <span v-else>{{ c.label }}</span>
          <span v-if="i < crumbs.length - 1" class="sep">/</span>
        </span>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-search">
        <span v-html="ic.search"></span>
        <input v-model="q" placeholder="全局搜索..." @keyup.enter="onSearch" />
        <kbd>⌘K</kbd>
      </div>
      <button class="topbar-action" @click="toggleTheme" :title="store.theme === 'dark' ? '浅色' : '深色'" v-html="store.theme === 'dark' ? ic.sun : ic.moon"></button>
      <button class="topbar-action" title="通知" v-html="ic.bell"></button>
      <button class="topbar-action" title="帮助" v-html="ic.help"></button>
      <a href="#/settings">
        <div class="avatar" style="cursor:pointer">{{ initials }}</div>
      </a>
    </header>
  `,
  setup() {
    const q = ref('');
    const crumbs = computed(() => {
      const r = store.route;
      const map = {
        overview: [{ label: '总览' }],
        projects: [{ label: '项目库' }],
        'project-detail': [{ label: '项目库', to: '/projects' }, { label: projectName.value }],
        notes: [{ label: '笔记' }, { label: '全部笔记' }],
        'note-edit': [{ label: '笔记', to: '/notes' }, { label: noteTitle.value || '编辑' }],
        agent: [{ label: 'Agent Chat' }],
        graph: [{ label: '图谱' }],
        settings: [{ label: '设置' }]
      };
      return map[r.name] || [{ label: r.name }];
    });
    const projectName = ref('');
    const noteTitle = ref('');
    watch(() => store.route, async (r) => {
      if (r.name === 'project-detail') {
        try { projectName.value = (await api.getProject(r.params.id)).data.name; } catch (e) { projectName.value = r.params.id; }
      }
      if (r.name === 'note-edit') {
        try { noteTitle.value = (await api.getNote(r.params.id)).data.title; } catch (e) { noteTitle.value = ''; }
      }
    }, { immediate: true });
    const toggleTheme = () => { store.theme = store.theme === 'dark' ? 'light' : 'dark'; };
    const onSearch = () => { navigate('/projects?q=' + encodeURIComponent(q.value)); };
    return { ic: Icon, store, crumbs, initials: computed(() => (store.user?.username || 'G').slice(0, 2).toUpperCase()), q, toggleTheme, onSearch };
  }
};

      const map = {};
      projects.value.forEach(p => { map[p.category_id] = (map[p.category_id] || 0) + 1; });
      const total = projects.value.length || 1;
      return Object.entries(map).map(([cid, count]) => {
        const cat = store.categories.find(c => c.id === cid);
        return { name: cat?.name || '其他', count, pct: (count / total) * 100, color: cat?.color || '#8e8e93' };
      }).sort((a, b) => b.count - a.count).slice(0, 6);
    });
    const projectName = (id) => projects.value.find(p => p.id === id)?.name || '';

      notes.value = (await api.listAllNotes()).data;
    });

    return { ic: Icon, store, user: computed(() => store.user), stats, recentProjects, recentNotes, categoryDist, projectName, categoryColor, progressLabel, greeting, formatDate };
  }
};

};

                <button class="btn btn-glass btn-sm">测试连通</button>
                <button class="btn btn-text btn-sm" style="color:var(--error)">解绑</button>
              </div>
            </div>
          </div>

          <div v-if="active==='llm'" class="card glass mb-md">
            <div class="row between mb-md">
              <h2 class="h2">LLM 配置（BYOK）</h2>
              <span class="badge badge-success badge-dot">已配置</span>
            </div>
            <div style="background:rgba(255,159,10,0.1);border:1px solid rgba(255,159,10,0.3);border-radius:10px;padding:10px 14px;font-size:12px;color:#8a5410;margin-bottom:16px;display:flex;gap:8px">
              <span>🔑</span> Key 仅本地 Fernet 加密存储（系统密钥链），不上传服务器。
            </div>
            <div class="field-group"><label class="field-label">服务提供商</label><div class="field"><select v-model="llm.provider"><option>openai</option><option>anthropic</option><option>google</option><option>azure</option><option>ollama</option><option>custom</option></select></div></div>
            <div class="field-group mt-md"><label class="field-label">模型</label><div class="field"><input v-model="llm.model" /></div></div>
            <div class="field-group mt-md"><label class="field-label">API Base URL</label><div class="field"><input v-model="llm.api_base" /></div></div>
            <div class="field-group mt-md"><label class="field-label">API Key</label><div class="field" style="position:relative"><input :type="showKey ? 'text' : 'password'" v-model="llm.api_key" /><button class="icon-btn" @click="showKey = !showKey" style="position:absolute;right:6px" v-html="ic.eye"></button></div></div>
            <div class="row gap-sm mt-md">
              <button class="btn btn-primary" @click="testLLM" :disabled="testing">
                <span v-if="testing" class="spinner" style="width:14px;height:14px"></span>
                <span v-else>测试连通性</span>
              </button>
              <button class="btn btn-glass" @click="saveLLM">保存配置</button>
            </div>
            <div v-if="testResult" class="mt-md" :style="{ background: testResult.ok ? 'rgba(52,199,89,0.1)' : 'rgba(255,59,48,0.1)', border: '1px solid ' + (testResult.ok ? 'rgba(52,199,89,0.3)' : 'rgba(255,59,48,0.3)'), color: testResult.ok ? '#1e7e34' : '#c0392b', padding: '10px 14px', borderRadius: '10px', fontSize: '12px' }">
              {{ testResult.ok ? '✓' : '✗' }} {{ testResult.message }}
            </div>
          </div>

          <div v-if="active==='security'" class="card glass mb-md">
            <h2 class="h2 mb-md">修改密码</h2>
            <p class="muted small mb-md">修改密码会使所有 refresh_token 失效。</p>
            <div class="field-group"><label class="field-label">当前密码</label><div class="field"><input type="password" v-model="pwd.old" /></div></div>
            <div class="field-group mt-md"><label class="field-label">新密码</label><div class="field"><input type="password" v-model="pwd.new" /></div></div>
            <div class="field-group mt-md"><label class="field-label">确认新密码</label><div class="field"><input type="password" v-model="pwd.confirm" /></div></div>
            <button class="btn btn-primary mt-md" @click="changePwd">修改密码</button>
          </div>

          <div v-if="active==='data'" class="card glass" style="border:1px solid var(--error)">
            <h2 class="h2" style="color:var(--error)">危险操作</h2>
            <p class="muted small mt-sm mb-md">以下操作不可恢复。</p>
            <div class="row gap-sm">
              <button class="btn btn-glass btn-sm" @click="exportData">导出全部数据</button>
              <button class="btn btn-sm" style="background:transparent;color:var(--error);border:1px solid var(--error)" @click="logout">退出登录</button>
            </div>
          </div>
        </div>
      </div>
    </AppLayout>
  `,
  setup() {
    const ic = Icon;
    const active = ref('appearance');
    const sections = [
      { id: 'appearance', label: '外观', icon: ic.sun },
      { id: 'github', label: 'GitHub', icon: ic.projects },
      { id: 'llm', label: 'LLM 配置', icon: ic.sparkle },
      { id: 'security', label: '用户与安全', icon: ic.settings },
      { id: 'data', label: '数据管理', icon: ic.download }
    ];
    const fontScale = ref(store.settings?.font_scale || 100);
    watch(fontScale, (v) => { document.documentElement.style.fontSize = (v / 100 * 14) + 'px'; });
    const themePreview = (t) => t === 'light' ? '#f2f2f7' : t === 'dark' ? '#1c1c1e' : 'linear-gradient(90deg, #f2f2f7 50%, #1c1c1e 50%)';
    const setTheme = (t) => { store.theme = (t === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : t); };
    const llm = reactive({ provider: 'openai', model: 'gpt-4o', api_base: 'https://api.openai.com/v1', api_key: 'sk-proj-a8d2Hf93kdL02mcQyVbnrE9wX7pT4uY6i0sZaBcDeFgHiJkLmN' });
    const showKey = ref(false);
    const testResult = ref(null); const testing = ref(false);
    const testLLM = async () => { testing.value = true; testResult.value = null; try { const r = await api.testLLM(); testResult.value = { ok: true, message: `连通成功 · 延迟 ${r.data.latency_ms}ms` }; } catch (e) { testResult.value = { ok: false, message: e.message }; } finally { testing.value = false; } };
    const saveLLM = async () => { await api.updateSettings({ llm_provider: llm.provider, llm_model: llm.model, llm_api_base: llm.api_base }); toast('配置已保存', 'success'); };
    const pwd = reactive({ old: '', new: '', confirm: '' });
    const changePwd = async () => { if (pwd.new !== pwd.confirm) return toast('两次密码不一致', 'error'); await api.changePassword({ old_password: pwd.old, new_password: pwd.new }); toast('密码已修改', 'success'); setTimeout(() => logout(), 1200); };
    const exportData = async () => { const r = await api.exportProjects(); const blob = new Blob([JSON.stringify(r.data, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `repopilot-export-${Date.now()}.json`; a.click(); toast('已导出', 'success'); };
    const logout = async () => { await api.logout(); store.isAuth = false; window.location.hash = '/login'; };

    return { active, sections, store, fontScale, themePreview, setTheme, llm, showKey, testResult, testing, testLLM, saveLLM, pwd, changePwd, exportData, logout, ic };
  }
};

// ============ 5.9 LoginPage ============
const LoginPage = {
  template: `
    <div style="min-height:100vh;display:grid;place-items:center;padding:32px;position:relative;z-index:10">
      <div class="card glass glass-strong login-card" style="width:100%;max-width:460px;padding:40px 36px;text-align:center">
        <div class="sidebar-logo" style="width:64px;height:64px;margin:0 auto 20px;font-size:24px;border-radius:16px">RP</div>
        <h1 style="font-size:26px;font-weight:700;margin:0 0 6px;letter-spacing:-0.02em">欢迎回来</h1>
        <p class="muted" style="font-size:13px;margin:0 0 28px">登录 RepoPilot，继续你的开源项目学习</p>
        <div v-if="error" style="padding:10px 14px;background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.3);border-radius:10px;color:#c0392b;font-size:13px;margin-bottom:16px;text-align:left">
          {{ error }}
        </div>
        <div class="field-group" style="text-align:left">
          <label class="field-label">用户名</label>

        <div class="field-group" style="text-align:left">

          <div class="field"><input v-model="password" type="password" placeholder="••••••••" @keyup.enter="submit" /></div>
        </div>
        <div class="row between mt-sm mb-md" style="font-size:12px">
          <label class="row gap-sm" style="cursor:pointer">
            <input type="checkbox" v-model="remember" /> 记住我
          </label>
          <a class="muted">忘记密码？</a>
        </div>
        <button class="btn btn-primary btn-block btn-lg" @click="submit" :disabled="loading">
          <span v-if="loading" class="spinner" style="width:14px;height:14px"></span>
          <span v-else>登录</span>
        </button>
        <div class="mt-md muted small">还没有账号？<a href="#/register" style="color:var(--brand-500);font-weight:600">立即注册</a></div>
        <div class="mt-lg muted" style="font-size:10px">v1.0.0 · {{ store.theme === 'dark' ? '深色' : '浅色' }}主题</div>
      </div>
    </div>
  `,
  setup() {
    const username = ref('zhang.jie');
    const password = ref('demo1234');
    const remember = ref(true);
    const loading = ref(false);
    const error = ref('');
    const submit = async () => {
      loading.value = true; error.value = '';
      try {
        await api.login({ username: username.value, password: password.value });
        store.isAuth = true;
        await loadBootstrap();

        toast('登录成功', 'success');

// ============ 5.10 RegisterPage ============
const RegisterPage = {
  template: `
    <div style="min-height:100vh;display:grid;place-items:center;padding:32px;position:relative;z-index:10">
      <div class="card glass glass-strong login-card" style="width:100%;max-width:460px;padding:40px 36px;text-align:center">
        <div class="sidebar-logo" style="width:64px;height:64px;margin:0 auto 20px;font-size:24px;border-radius:16px">RP</div>
        <h1 style="font-size:26px;font-weight:700;margin:0 0 6px;letter-spacing:-0.02em">创建账号</h1>
        <p class="muted" style="font-size:13px;margin:0 0 28px">开启你的 AI 开源项目学习之旅</p>
        <div class="field-group" style="text-align:left">
          <label class="field-label">用户名 <span class="muted" style="font-weight:400">(3-32 字符)</span></label>
          <div class="field"><input v-model="username" placeholder="yourname" /></div>
        </div>
        <div class="field-group" style="text-align:left">
          <label class="field-label">密码 <span class="muted" style="font-weight:400">(≥ 8 位 + 字母数字)</span></label>
          <div class="field"><input v-model="password" type="password" placeholder="至少 8 位" @input="updateStrength" /></div>
          <div :class="['strength-bar', strength]" style="display:flex;gap:4px;margin-top:6px"><div></div><div></div><div></div></div>
          <div style="font-size:11px;color:var(--text-500);margin-top:4px;text-align:left">{{ strengthLabel }}</div>
        </div>
        <div class="field-group" style="text-align:left">
          <label class="field-label">确认密码</label>
          <div class="field"><input v-model="confirm" type="password" /></div>
          <div v-if="confirm && confirm !== password" class="field-error">两次密码不一致</div>
        </div>
        <button class="btn btn-primary btn-block btn-lg mt-md" @click="submit" :disabled="loading || !canSubmit">
          <span v-if="loading" class="spinner" style="width:14px;height:14px"></span>
          <span v-else>创建账号</span>
        </button>
        <div class="mt-md muted small">已有账号？<a href="#/login" style="color:var(--brand-500);font-weight:600">立即登录</a></div>
      </div>
    </div>
  `,
  setup() {
    const username = ref(''); const password = ref(''); const confirm = ref(''); const loading = ref(false);
    const strength = ref('weak'); const strengthLabel = ref('弱');
    const updateStrength = () => { const p = password.value; if (p.length < 8) { strength.value = 'weak'; strengthLabel.value = '太短'; } else if (/[a-z]/.test(p) && /[0-9]/.test(p) && p.length >= 12) { strength.value = 'strong'; strengthLabel.value = '强'; } else { strength.value = 'medium'; strengthLabel.value = '中等'; } };
    const canSubmit = computed(() => username.value.length >= 3 && password.value.length >= 8 && password.value === confirm.value);
    const submit = async () => { loading.value = true; try { await api.register({ username: username.value, password: password.value }); await api.login({ username: username.value, password: password.value }); store.isAuth = true; await loadBootstrap(); window.location.hash = '/'; toast('注册成功', 'success'); } finally { loading.value = false; } };
    return { username, password, confirm, loading, strength, strengthLabel, updateStrength, canSubmit, submit };
  }
};

// ==========================================================================
// 6. 路由分发
// ==========================================================================
const App = {
  template: `<component :is="currentPage" />`,
  setup() {
    return {
      currentPage: computed(() => {
        // 未登录 → 强制跳转 login（除非在 public 页面）
        if (!store.isAuth && !['login', 'register'].includes(store.route.name)) {
          // 用 nextTick 延迟跳转，避免渲染期修改
          nextTick(() => { window.location.hash = '/login'; });
          return LoginPage;
        }
        // 已登录但访问 login/register → 跳总览
        if (store.isAuth && ['login', 'register'].includes(store.route.name)) {
          nextTick(() => { window.location.hash = '/'; });
          return OverviewPage;
        }
        const map = {
          overview: OverviewPage,
          projects: ProjectsPage,
          'project-detail': ProjectDetailPage,
          notes: NotesListPage,
          'note-edit': NoteEditPage,
          agent: AgentPage,
          graph: GraphPage,
          settings: SettingsPage,
          login: LoginPage,
          register: RegisterPage
        };
        return map[store.route.name] || OverviewPage;
      })
    };
  }
};

// ==========================================================================
// 7. 启动
// ==========================================================================
const app = createApp(App);
app.mount('#app');

// 初始化 bootstrap
loadBootstrap();

// 默认 hash
if (!window.location.hash) {
  window.location.hash = store.isAuth ? '/' : '/login';
}

console.log('[RepoPilot] App initialized', { route: store.route, isAuth: store.isAuth });
</script>
</body>
